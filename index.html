<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POSM Ms Trúc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1d1c1a; --soft:#5b574f; --muted:#9a948a;
  --paper:#f5f2ea; --card:#fff; --line:#e6e1d6; --line2:#efebe2;
  --gold:#b8893a; --gold-soft:#f3e9d6;
  --red:#d64545; --red-soft:#fcebe9;
  --amber:#d98322; --amber-soft:#fbf0dd;
  --green:#3f8f5b;
  --c-intake:#8a92a3; --c-design:#5b6bb5; --c-review:#d98322; --c-produce:#9163c4; --c-install:#2f9e8f; --c-done:#3f8f5b;
  --r:12px; --r-sm:8px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:13.5px;-webkit-font-smoothing:antialiased}

/* header */
.head{padding:14px 20px 0;max-width:1480px;margin:0 auto}
.row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-weight:800;font-size:18px;letter-spacing:-.3px}
.brand b{color:var(--gold)}
.brand span{font-size:12px;color:var(--muted);font-weight:500;margin-left:8px}
.row1 .sp{flex:1}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:7px 12px;border-radius:var(--r-sm);
  font:inherit;font-weight:600;font-size:12px;cursor:pointer;transition:.12s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:#000}
.btn.sm{padding:5px 9px;font-size:11.5px}

/* progress bar */
.prog{display:flex;align-items:center;gap:12px;margin:14px 0 10px}
.prog .track{flex:1;height:8px;background:#e7e2d7;border-radius:20px;overflow:hidden;display:flex}
.prog .seg{height:100%}
.prog .lbl{font-size:12px;color:var(--soft);font-weight:600;white-space:nowrap}
.prog .lbl b{color:var(--ink)}

/* filter row */
.searchbar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:4px 6px 4px 14px;margin:12px 0 10px;max-width:560px}
.searchbar .sicon{font-size:13px;opacity:.6}
.searchbar input{flex:1;border:none;outline:none;font:inherit;font-size:13.5px;background:transparent;padding:6px 2px}
.searchbar .sclear{border:none;background:#efece5;color:var(--soft);border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px;font-weight:700}
.searchbar .sclear:hover{background:var(--line)}
.searchbar .scount{font-size:11.5px;color:var(--muted);font-weight:600;white-space:nowrap;padding-right:8px}
.filt{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:6px 0 12px}
.pill{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:5px 12px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.12s}
.pill:hover{border-color:var(--ink)}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pill .n{font-weight:800}
.pill.red.on{background:var(--red);border-color:var(--red)} .pill.red .n{color:var(--red)} .pill.red.on .n{color:#fff}
.pill.amber.on{background:var(--amber);border-color:var(--amber)} .pill.amber .n{color:var(--amber)} .pill.amber.on .n{color:#fff}
select.f{font:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);border-radius:20px;padding:6px 10px;background:var(--card)}
input.search{font:inherit;font-size:12px;border:1px solid var(--line);border-radius:20px;padding:6px 12px;min-width:170px;background:var(--card)}
input.search:focus,select.f:focus{outline:none;border-color:var(--gold)}

/* board */
.board{display:flex;gap:12px;padding:4px 20px 80px;max-width:1480px;margin:0 auto;overflow-x:auto;align-items:flex-start}
.col{flex:1 0 220px;min-width:220px;background:#fbf9f4;border:1px solid var(--line2);border-radius:var(--r);padding:8px;transition:.12s}
.col.drag{background:var(--gold-soft);border-color:var(--gold)}
.col h3{margin:2px 4px 9px;font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:7px;color:var(--soft);text-transform:uppercase;letter-spacing:.3px}
.col h3 .dot{width:9px;height:9px;border-radius:50%;flex:none}
.col h3 .cnt{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 9px;font-size:11.5px;color:var(--ink)}
.colbody{min-height:30px;display:flex;flex-direction:column;gap:7px}

/* card */
.card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:var(--r-sm);
  padding:9px 10px;cursor:grab;transition:.1s;box-shadow:0 1px 1px rgba(0,0,0,.03)}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.07);transform:translateY(-1px)}
.card:active{cursor:grabbing}
.card.urgent{border-left-color:var(--red)}
/* Khung khoanh vùng đỏ khi nhảy từ thông báo tới card */

/* ===== Nhan xet / Comment (them moi) ===== */
.cmtWrap{margin-top:18px;border-top:1px solid var(--line);padding-top:12px}
.cmtTitle{font-size:12px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.cmtCntBadge{background:var(--gold-soft);color:var(--gold);border-radius:20px;padding:1px 9px;font-size:11px;font-weight:800}
.cmtList{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.cmtEmpty{font-size:12px;color:var(--muted);padding:8px 2px}
.cmtItem{background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 10px;margin-bottom:6px}
.cmtHead{display:flex;align-items:baseline;gap:8px;font-size:12.5px}
.cmtHead b{color:var(--ink)}
.cmtTime{font-size:10.5px;color:var(--muted)}
.cmtBody{font-size:13px;line-height:1.5;color:var(--ink);margin:3px 0 5px;white-space:normal;word-break:break-word}
.cmtImg{max-width:100%;max-height:220px;border-radius:8px;border:1px solid var(--line);margin-top:4px;cursor:zoom-in;display:block}
.cmtMention{background:var(--gold-soft);color:var(--gold);font-weight:700;border-radius:4px;padding:0 3px}
.cmtActs{display:flex;gap:10px}
.cmtAct{border:none;background:none;color:var(--muted);font:inherit;font-size:11px;font-weight:700;cursor:pointer;padding:0}
.cmtAct:hover{color:var(--ink)}
.cmtAct.del:hover{color:var(--red)}
.cmtForm{position:relative}
.cmtReplyTo{font-size:11.5px;color:var(--soft);background:var(--gold-soft);border-radius:6px;padding:4px 8px;margin-bottom:6px}
.cmtInput{width:100%;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 10px;background:#fff;min-height:52px;resize:vertical}
.cmtInput:focus{outline:none;border-color:var(--gold)}
.cmtBar{display:flex;align-items:center;gap:8px;margin-top:6px}
.cmtEmojiBtn{font-size:11.5px;font-weight:700;color:var(--soft);cursor:pointer;border:1px solid var(--line);border-radius:20px;padding:4px 10px}
.cmtEmojiBtn:hover{border-color:var(--gold);color:var(--gold)}
.cmtEmojiBox{position:absolute;bottom:42px;left:0;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:6px;display:flex;flex-wrap:wrap;gap:4px;max-width:260px;box-shadow:0 6px 18px rgba(0,0,0,.12);z-index:5}
.cmtEmojiItem{font-size:18px;cursor:pointer;padding:2px 4px;border-radius:6px}
.cmtEmojiItem:hover{background:var(--gold-soft)}
.cmtMenu{position:absolute;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:0 6px 18px rgba(0,0,0,.12);z-index:6;max-height:160px;overflow:auto;min-width:150px}
.cmtMi{padding:6px 10px;font-size:12.5px;cursor:pointer}
.cmtMi:hover{background:var(--gold-soft)}
.cmtBadge{font-size:10.5px;font-weight:700;color:var(--soft);display:inline-flex;align-items:center;gap:3px}

.card.notif-target{position:relative;animation:notifPulse 1s ease-in-out 0s 2;box-shadow:0 0 0 3px var(--red),0 6px 18px rgba(0,0,0,.18)!important;border-color:var(--red)!important}
tr.notif-target{animation:notifPulse 1s ease-in-out 0s 2}
tr.notif-target>td{border-top:2px solid var(--red)!important;border-bottom:2px solid var(--red)!important;background:var(--red-soft)!important}
tr.notif-target>td:first-child{border-left:2px solid var(--red)!important}
tr.notif-target>td:last-child{border-right:2px solid var(--red)!important}
@keyframes notifPulse{0%,100%{box-shadow:0 0 0 3px var(--red),0 6px 18px rgba(0,0,0,.18)}50%{box-shadow:0 0 0 6px rgba(214,64,64,.35),0 6px 18px rgba(0,0,0,.18)}}
.notifItem{cursor:pointer;transition:background .1s}
.notifItem:hover{background:var(--gold-soft)}
.notifItem.notifMention{background:var(--gold-soft);border-left:3px solid var(--gold)}
.notifItem.notifMention:hover{background:var(--gold-soft);filter:brightness(.97)}
.cmtItem.notif-target{border-radius:8px;animation:notifPulse 1s ease-in-out 0s 2;box-shadow:0 0 0 3px var(--gold),0 4px 12px rgba(0,0,0,.15);padding:4px}
#btnEditNick{cursor:pointer}
.card.stuck{border-left-color:var(--amber)}
.card .nm{font-weight:700;font-size:13px;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .mt{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.card .mt .br{font-weight:600;color:var(--gold)}
.brtag{font-size:10.5px;font-weight:700;padding:1.5px 8px;border-radius:20px;display:inline-block}
.card .upd{font-size:10.5px;color:var(--muted);margin-top:4px}
.pillsm{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;letter-spacing:.2px}
.pillsm.over{background:var(--red);color:#fff}
.pillsm.warn{background:var(--amber-soft);color:#9a5a14}
.pillsm.ok{background:#f0ede6;color:var(--soft)}
.pillsm.gap{background:var(--red-soft);color:#a32f2f}
.pillsm.demo{background:#efece5;color:#9a5a14}
.card .arrows{display:flex;gap:4px;margin-top:7px;opacity:0;transition:.1s}
.card:hover .arrows{opacity:1}
.arrow{flex:1;border:1px solid var(--line);background:#fff;border-radius:6px;padding:3px;font-size:11px;font-weight:700;cursor:pointer;color:var(--soft)}
.arrow:hover{border-color:var(--ink);color:var(--ink)}
.arrow:disabled{opacity:.3;cursor:default}
.emptycol{text-align:center;color:var(--muted);font-size:11px;padding:14px 6px;border:1px dashed var(--line);border-radius:var(--r-sm)}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(28,27,25,.42);display:none;z-index:40}
.scrim.on{display:block}
.draw{position:fixed;right:0;top:0;bottom:0;width:min(480px,94vw);background:var(--paper);z-index:50;transform:translateX(100%);transition:.22s;box-shadow:-8px 0 40px rgba(0,0,0,.16);display:flex;flex-direction:column}
.draw.on{transform:translateX(0)}
.draw header{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.draw header h3{margin:0;font-size:15px;font-weight:800;flex:1}
.draw .db{padding:16px 18px;overflow:auto;flex:1}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px}
.fld .v{font-size:13.5px;color:var(--ink);line-height:1.5;white-space:pre-wrap}
.fld select,.fld input,.fld textarea{width:100%;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 10px;background:#fff}
.fld textarea{min-height:60px;resize:vertical}
.fld select:focus,.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--gold)}
.two{display:flex;gap:10px}.two>div{flex:1}
.draw textarea.paste{width:100%;min-height:190px;font-family:ui-monospace,monospace;font-size:11.5px;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px;resize:vertical;background:#fff}
.hint{font-size:12px;color:var(--muted);line-height:1.55}
.hint code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:11px}
.steps{font-size:12.5px;color:var(--soft);line-height:1.7;padding-left:18px}
.divider{height:1px;background:var(--line);margin:16px 0}
.flagbtn{border:1px solid var(--line);background:#fff;border-radius:var(--r-sm);padding:8px 12px;font:inherit;font-weight:600;font-size:12.5px;cursor:pointer}
.flagbtn.on{background:var(--amber-soft);border-color:var(--amber);color:#9a5a14}
.prow{display:flex;gap:6px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px;margin-bottom:7px;flex-wrap:wrap}
.prow input.pn{flex:1 1 100%;font:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:7px;padding:6px 8px}
.prow select{flex:1;min-width:96px}
.prow .rm{border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 9px;cursor:pointer;color:var(--red);font-weight:700}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.2s;z-index:60;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
a.dl{color:var(--gold);font-weight:600;text-decoration:none}a.dl:hover{text-decoration:underline}
  .pcard{border:1px solid #e8e2d6;border-radius:12px;padding:10px;margin-bottom:10px;background:#fff}
  .pcard .pn{width:100%;margin-bottom:6px;font-weight:600}
  .pcard .pg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
  .pcard .pg2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
  .pcard select,.pcard input,.pcard textarea{width:100%;padding:7px 8px;border:1px solid #e0d8c8;border-radius:8px;font-size:13px;font-family:inherit;box-sizing:border-box}
  .pcard textarea{min-height:54px;resize:vertical}
  .pcard .rm{margin-top:2px;background:#fbeaea;border:1px solid #f0c2bd;color:#b3261e;border-radius:8px;padding:7px 10px;width:100%;cursor:pointer}
  .thumb{max-width:100%;max-height:200px;border-radius:10px;border:1px solid #e8e2d6;display:block}
  .cimg{height:48px;width:auto;max-width:100%;object-fit:cover;border-radius:6px;margin-top:6px;display:block}
  .tabs{display:flex;gap:6px;margin-top:10px}
  .tab{flex:1;padding:9px 10px;border:1px solid #e6dfce;background:#fff;border-radius:10px;font-weight:700;font-size:13px;color:#8a857d;cursor:pointer}
  .tab.on{background:#c79a3a;color:#fff;border-color:#c79a3a}
  .dsum{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 10px}
  .dsum .s{padding:8px 12px;border-radius:10px;font-weight:700;font-size:13px}
  .dctrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .dctrl select{padding:8px;border:1px solid #e0d8c8;border-radius:8px;font-size:13px;background:#fff}
  .dlist{display:flex;flex-direction:column;gap:16px;padding-bottom:50px}
  .dgrp h4{margin:0 0 8px;font-size:13px;color:#8a857d;font-weight:700}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  .dcard{border:1px solid #e8e2d6;border-left-width:4px;border-radius:12px;padding:10px;background:#fff;cursor:pointer}
  .dcard.red{border-left-color:#d64545}.dcard.amber{border-left-color:#e0a32e}.dcard.green{border-left-color:#3f9d6b}.dcard.gray{border-left-color:#c3bdb0}
  .dcard .dt{font-weight:700;font-size:13px;margin-bottom:5px}
  .dcard .dmeta{font-size:12px;color:#8a857d;display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:3px 0}
  .dbadge{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
  .dprog{font-size:13px;margin:3px 0}
  .dcimg{width:100%;max-height:80px;object-fit:cover;border-radius:8px;margin-top:6px;display:block}
  .tytag{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:800;vertical-align:middle;margin-right:3px}
  .ty-tv{background:#e6edfb;color:#3556a8}.ty-standee{background:#e7f3ec;color:#2f7d4f}.ty-tentcard{background:#fbeede;color:#b56a17}.ty-khác,.ty-{background:#eceef0;color:#5a6472}
  .dbranch{font-weight:800;font-size:15px;margin:14px 0 2px;padding-top:8px;border-top:2px solid #efe8d8}
  .darea{font-size:11px;font-weight:800;color:#8a857d;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.4px}
  .dcolwrap{display:flex;gap:10px;overflow-x:auto;padding:4px 0 8px;align-items:flex-start}
  .dcol{flex:1 1 0;min-width:200px;background:#faf7ef;border:1px solid #efe8d8;border-radius:10px;padding:6px}
  .dcol.dzover{border-color:#caa64a;background:#fff8e6}
  .dcolhd{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 6px;font-size:12px}
  .dcolbody{display:flex;flex-direction:column;gap:6px;min-height:40px}
  .dbadge2{padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;background:#eef0f2;color:#5a6472}
  .dcard.none{border-left-color:#d9d2c4}

/* CTKM */
.row2{display:flex;gap:10px}.row2>div{flex:1}
.btn.danger{background:#fdecea;color:#c0392b;border-color:#f5c6c0}
.pillsm.green{background:#e7f6ec;color:#1e7e44}.pillsm.amber{background:#fff6e6;color:#9a6a00}.pillsm.red{background:#fdeceb;color:#c0392b}

.ptable th{background:#f5f2ea;font-weight:700;position:sticky;top:0;z-index:1;white-space:nowrap}
.ptable .pcell{min-height:18px;outline:none;white-space:pre-wrap;word-break:break-word}
.ptable .pcell:focus{background:#fff7e6;box-shadow:inset 0 0 0 2px var(--gold-soft)}
.ptable tr:hover td{background:#fcfbf7}
.btn.sm{padding:2px 8px;font-size:11px}

.imgdz{border:2px dashed #cdbfa0;border-radius:10px;padding:14px;text-align:center;
  color:#9a8c70;font-size:13px;margin:6px 0;cursor:pointer;outline:none;transition:.15s}
.imgdz:focus{border-color:#caa45a;background:#fbf6ea}
.imgdz.dzover{border-color:#caa45a;background:#f5ecd6;color:#6b5a37}
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;

.lbox.on{display:flex}
.lbox img{max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.cimg,.thumb{cursor:zoom-in}

  /* === STANDEE/TENTCARD/TV: bảng, thu gọn, mục trống === */
  .dcard.empty{background:#f6f4ef;border-style:dashed;border-color:#c9c2b4}

  .dviewtoggle{display:inline-flex;border:1px solid #e0d9cb;border-radius:9px;overflow:hidden;margin-right:6px}
  .dviewtoggle button{border:none;background:#fff;color:#6b665d;font-size:12px;font-weight:700;padding:5px 10px;cursor:pointer}

.notifWrap{position:relative;display:inline-block}

/* ---------- logic ---------- */
function arr(){return Object.values(store.tasks);}
function parseDate(s){if(!s)return null;s=(''+s).trim();
  let m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);if(m){let a=+m[1],b=+m[2];if(a>12)return new Date(+m[3],b-1,a);return new Date(+m[3],a-1,b);}
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2})$/);if(m)return new Date(2000+ +m[3],+m[2]-1,+m[1]);
  const d=new Date(s);return isNaN(d)?null:d;}
function daysLeft(t){const d=parseDate(t.deadline);if(!d)return null;const a=new Date();a.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((d-a)/86400000);}
function isDone(t){return t.col==='done';}
function isOverdue(t){if(isDone(t))return false;const dl=daysLeft(t);return dl!==null&&dl<0;}
function isUrgent(t){if(isDone(t))return false;const dl=daysLeft(t);return t.prio==='Gấp'||(dl!==null&&dl<=2);}
function isStuck(t){if(isDone(t))return false;if(t.stuck)return true;if(isOverdue(t))return true;return t.col==='intake'||t.col==='review';}

/* ---------- render ---------- */
function render(){
  renderDisplays();
  const A=arr().filter(t=>t.kind!=='display'&&t.kind!=='promo');
  const done=A.filter(isDone),urg=A.filter(isUrgent),over=A.filter(isOverdue),stk=A.filter(isStuck);
  // progress bar by column
  const track=document.getElementById('progTrack');
  track.innerHTML=COLS.map(c=>{const n=A.filter(t=>t.col===c.id).length;const w=A.length?n/A.length*100:0;
    return `<div class="seg" style="width:${w}%;background:${c.color}" title="${c.label}: ${n}"></div>`;}).join('');
  document.getElementById('progLbl').innerHTML=`Xong <b>${done.length}/${A.length}</b> · ${A.length?Math.round(done.length/A.length*100):0}%`;
  // filter pills
  document.getElementById('filt').innerHTML=
    `<button class="pill ${filter.tag==='all'?'on':''}" onclick="setTag('all')">Tất cả <span class="n">${A.length}</span></button>`+
    `<button class="pill red ${filter.tag==='urgent'?'on':''}" onclick="setTag('urgent')">🔴 Gấp <span class="n">${urg.length}</span></button>`+
    `<button class="pill red ${filter.tag==='over'?'on':''}" onclick="setTag('over')">⏰ Trễ <span class="n">${over.length}</span></button>`+
    `<button class="pill amber ${filter.tag==='stuck'?'on':''}" onclick="setTag('stuck')">⚠️ Kẹt <span class="n">${stk.length}</span></button>`+
    `<span style="width:1px;height:22px;background:var(--line);margin:0 2px"></span>`+`<button class="pill ${filter.branch===''?'on':''}" onclick="setBranch('')">Tất cả CN</button>`+['Quận 2','Quận 1','Quận 7','Đà Nẵng','Thủ Đức'].map(b=>`<button class="pill ${filter.branch===b?'on':''}" onclick="setBranch('${b}')">${b}</button>`).join('')+`<select class="f" onchange="filter.branch=this.value;render()"><option value="">Tất cả chi nhánh</option>`+
      [...new Set(A.map(t=>t.branch).filter(Boolean))].sort().map(b=>`<option ${filter.branch===b?'selected':''}>${b}</option>`).join('')+`</select>`;
  // board
  const board=document.getElementById('board');
  if(!A.length){board.innerHTML='<div style=\"padding:30px;text-align:center;color:var(--muted);width:100%\">Chưa có task nào.<br>Nếu chị mở qua link <b>claude.ai</b> thì sandbox có thể chặn dữ liệu — hãy tải file về máy hoặc host lên Netlify.<br>Hoặc dùng <b>✍ Tự nhập</b> / <b>⬇ Dán Sheet</b> / <b>🔄 Đồng bộ</b> để thêm task.</div>';return;}
  // cập nhật UI tìm kiếm
  const matched=A.filter(pass).length;
  const sc=document.getElementById('searchCount'),scl=document.getElementById('searchClear');
  if(sc)sc.textContent=filter.q?(matched+' kết quả'):'';
  if(scl)scl.style.display=filter.q?'block':'none';
  board.innerHTML=COLS.map(c=>{
    let items=A.filter(t=>t.col===c.id&&pass(t));
    items.sort((a,b)=>(daysLeft(a)??999)-(daysLeft(b)??999));
    const total=A.filter(t=>t.col===c.id).length;
    return `<div class="col" data-col="${c.id}"
        ondragover="dOver(event,'${c.id}')" ondragleave="dLeave(event)" ondrop="dDrop(event,'${c.id}')">
      <h3><span class="dot" style="background:${c.color}"></span>${c.label}<span class="cnt">${total}</span></h3>
      <div class="colbody">${items.length?items.map(cardHTML).join(''):'<div class="emptycol">—</div>'}</div>
    </div>`;
  }).join('');
}
function pass(t){
  if(filter.tag==='urgent'&&!isUrgent(t))return false;
  if(filter.tag==='over'&&!isOverdue(t))return false;
  if(filter.tag==='stuck'&&!isStuck(t))return false;
  if(filter.branch&&t.branch!==filter.branch)return false;
  if(filter.q){const h=[t.taskId,t.pdx,t.name,t.requester,t.branch,t.detail,t.note].join(' ').toLowerCase();if(!h.includes(filter.q.toLowerCase()))return false;}
  return true;
}
function cardHTML(t){
  const dl=daysLeft(t);let dlp='';
  if(!isDone(t)&&dl!==null){
    if(dl<0)dlp=`<span class="pillsm over">TRỄ ${-dl}n</span>`;
    else if(dl===0)dlp=`<span class="pillsm over">HÔM NAY</span>`;
    else if(dl<=2)dlp=`<span class="pillsm warn">còn ${dl}n</span>`;
    else dlp=`<span class="pillsm ok">còn ${dl}n</span>`;
  }
  const gap=(!isDone(t)&&t.prio==='Gấp')?`<span class="pillsm gap">GẤP</span>`:'';
  const demo=t.demo?`<span class="pillsm demo">DEMO</span>`:'';
  const cls=isUrgent(t)?'urgent':(isStuck(t)?'stuck':'');
  const i=COL_IDS.indexOf(t.col);
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  return `<div class="card ${cls}" data-id="${t.taskId}" draggable="true" ondragstart="dStart(event,'${t.taskId}')" ondragend="dEnd()" onclick="openTask('${t.taskId}')">
    <div class="nm">${esc(t.name)||'(chưa có tên SP)'}</div>
    <div class="mt"><span class="brtag" style="${brCss(t.branch)}">${esc(t.branch)||'—'}</span><span>${esc(t.pdx)||'—'}</span>${gap}${dlp}${demo}</div>
    ${t.updated?`<div class="upd">cập nhật ${fmtVN(t.updated)}</div>`:''}
    ${cmtCount(t)?`<div class="cmtBadge">💬 ${cmtCount(t)}</div>`:''}
    ${(imgList(t)[0])?`<img class="cimg" src="${imgList(t)[0]}" onclick="event.stopPropagation();zoomImg(this.src)">`:''}
    <div class="arrows" onclick="event.stopPropagation()">
      <button class="arrow" ${i<=0?'disabled':''} onclick="move('${t.taskId}',-1)">◀</button>
      <button class="arrow" ${i>=COL_IDS.length-1?'disabled':''} onclick="move('${t.taskId}',1)">▶</button>
    </div>
  </div>`;
}

function setCol(id,col){store.tasks[id].col=col;store.tasks[id].updated=todayStr(0);save();render();queuePush(id);}
function dStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';}
function dEnd(){dragId=null;document.querySelectorAll('.col.drag').forEach(c=>c.classList.remove('drag'));}
function dOver(e,col){e.preventDefault();e.currentTarget.classList.add('drag');}
function dLeave(e){e.currentTarget.classList.remove('drag');}
function dDrop(e,col){e.preventDefault();e.currentTarget.classList.remove('drag');if(dragId){setCol(dragId,col);}dragId=null;}

function setBranch(b){filter.branch=b;render();}
function setTag(t){filter.tag=(filter.tag===t&&t!=='all')?'all':t;if(t==='promo')renderPromos();
  render();}

function upd(id,k,v){if(!store.tasks[id])return;store.tasks[id][k]=v;store.tasks[id].updated=todayStr(0);save();queuePush(id);}

// === image drag-drop / paste / lightbox helpers (added) ===
function feedImg(id,files){
  const list = (files && files.length!==undefined) ? Array.from(files) : (files?[files]:[]);
  const imgs = list.filter(f=> f && /^image\//.test(f.type));
  if(!imgs.length){ toast('Chỉ nhận file ảnh'); return; }
  const inp=document.getElementById('imgf_'+id);
  if(!inp){ return; }
  const dt=new DataTransfer();
  imgs.forEach(f=>dt.items.add(f));
  inp.files=dt.files;
  attachImg(id,inp);
}
function imgDrop(e,id){
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove('dzover');
  const fs = e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files : null;
  if(fs && fs.length) feedImg(id,fs);
}
function imgDragOver(e){ e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('dzover'); }
function imgDragLeave(e){ e.currentTarget.classList.remove('dzover'); }
function imgPaste(e,id){
  const items=(e.clipboardData || window.clipboardData)?.items || [];
  for(const it of items){
    if(it.type && it.type.indexOf('image')===0){
      const f=it.getAsFile();
      if(f){ e.preventDefault(); feedImg(id,f); break; }
    }
  }
}
function zoomImg(src){
  let ov=document.getElementById('imgLightbox');
  if(!ov){
    ov=document.createElement('div');
    ov.id='imgLightbox';
    ov.className='lbox';
    ov.onclick=()=>{ ov.classList.remove('on'); };
    ov.innerHTML='<img>';
    document.body.appendChild(ov);
    document.addEventListener('keydown', ev=>{ if(ev.key==='Escape') ov.classList.remove('on'); });
  }
  ov.querySelector('img').src=src;
  ov.classList.add('on');

// === PĐX original image: attach (compress 480px) + drag/paste, stored in t.pdxImg (added) ===
function attachPdxImg(id,inp){
  var file=inp.files&&inp.files[0]; if(!file) return;
  imgToJpegDataURL(file, 480, 0.6, function(data, reason){
    if(!data){ toast(imgErrMsg(reason==='read'?'read':'decode')); if(inp) inp.value=''; return; }
    store.tasks[id].pdxImg=data; store.tasks[id].updated=todayStr(0); save();
    (store.tasks[id].kind==='display'?openDisplay:openTask)(id); render(); queuePush(id);
    toast('\u0110\u00e3 \u0111\u00ednh k\u00e8m \u1ea3nh P\u0110X'); if(inp) inp.value='';
  });
}
function pdxFeed(id,file){
  if(!file || !/^image\//.test(file.type)){ toast('Chỉ nhận file ảnh'); return; }
  if(!store.tasks[id]){ return; }
  imgToJpegDataURL(file, 480, 0.6, function(data, reason){
    if(!data){ toast(imgErrMsg(reason==='read'?'read':'decode')); return; }
    const t = store.tasks[id];
    if(!Array.isArray(t.pdxImgs)){ t.pdxImgs = t.pdxImg ? [t.pdxImg] : []; }
    t.pdxImgs.push(data);
    t.pdxImg = t.pdxImgs[0];
    t.updated = todayStr(0);
    save(); queuePush(id);
    if(typeof renderPdxThumbs==='function' && document.getElementById('pdxThumbs_'+id)) renderPdxThumbs(id);
    if(typeof __tbl!=='undefined' && __tbl){ __tbl.updateData([Object.assign({taskId:id},t)]); }
    if(t.kind==='display' && typeof openDisplay==='function'){ openDisplay(id); }
    render();
    toast('Đã đính kèm ảnh PĐX');
  });
}
function pdxDrop(e,id){
  e.preventDefault(); e.stopPropagation();
  if(e.currentTarget.classList) e.currentTarget.classList.remove('dzover');
  const files = e.dataTransfer && e.dataTransfer.files ? Array.from(e.dataTransfer.files) : [];
  files.filter(f=>/^image\//.test(f.type)).forEach(f=>pdxFeed(id,f));
}
function pdxPaste(e,id){
  const items=(e.clipboardData||window.clipboardData)?.items||[];
  for(const it of items){
    if(it.type && it.type.indexOf('image')===0){
      const f=it.getAsFile(); if(f){ e.preventDefault(); pdxFeed(id,f); }
    }
  }
}
function imgList(t){
  if(!t) return [];
  if(Array.isArray(t.imgs)) return t.imgs.filter(Boolean);
  if(t.img) return [t.img];
  return [];
}
function imgsGridHTML(id){
  var t=store.tasks[id]; var arr=imgList(t);

      + '<button class="btn sm" style="position:absolute;top:2px;right:2px;padding:0 6px;line-height:18px;border-color:#f0c2bd;color:var(--red);background:rgba(255,255,255,.9)" onclick="removeImg(\''+id+'\','+i+')">✕</button>'
      + '</div>';
  }).join('');
  return '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px">'+cells+'</div>';
}

function imgToJpegDataURL(file, maxDim, quality, cb){
  maxDim = maxDim || 480; quality = (quality==null?0.6:quality);
  function draw(w0,h0,drawer){
    var max=maxDim, w=w0, h2=h0;
    if(w>h2&&w>max){h2=Math.round(h2*max/w);w=max;} else if(h2>=w&&h2>max){w=Math.round(w*max/h2);h2=max;}
    var cv=document.createElement('canvas'); cv.width=w; cv.height=h2;
    try{ drawer(cv.getContext('2d'), w, h2); }catch(e){ cb(null,'draw'); return; }
    var data; try{ data=cv.toDataURL('image/jpeg', quality); }catch(err){ cb(null,'export'); return; }
    if(!data || data.indexOf('data:image/jpeg')!==0){ cb(null,'export'); return; }
    cb(data, null);
  }
  if(typeof createImageBitmap === 'function'){
    var opt; try{ opt={imageOrientation:'from-image'}; }catch(e){ opt=undefined; }
    var p; try{ p=createImageBitmap(file, opt); }catch(e){ p=null; }
    if(p && p.then){
      p.then(function(bmp){
        draw(bmp.width, bmp.height, function(ctx,w,h){ ctx.drawImage(bmp,0,0,w,h); try{bmp.close&&bmp.close();}catch(e){} });
      }).catch(function(){ fallbackImg(); });
      return;
    }
  }
  fallbackImg();
  function fallbackImg(){
    var rd=new FileReader();
    rd.onerror=function(){ cb(null,'read'); };
    rd.onload=function(e){
      var im=new Image();
      im.onload=function(){ draw(im.width, im.height, function(ctx,w,h){ ctx.drawImage(im,0,0,w,h); }); };
      im.onerror=function(){ cb(null,'decode'); };
      im.src=e.target.result;
    };
    rd.readAsDataURL(file);
  }
}
function imgErrMsg(reason){
  if(reason==='decode'||reason==='draw'){ return '\u1ea2nh kh\u00f4ng \u0111\u1ecdc \u0111\u01b0\u1ee3c (c\u00f3 th\u1ec3 l\u00e0 \u0111\u1ecbnh d\u1ea1ng HEIC c\u1ee7a iPhone). H\u00e3y v\u00e0o C\u00e0i \u0111\u1eb7t > Camera > \u0110\u1ecbnh d\u1ea1ng > "T\u01b0\u01a1ng th\u00edch nh\u1ea5t" (JPEG) r\u1ed3i ch\u1ee5p l\u1ea1i, ho\u1eb7c ch\u1ecdn \u1ea3nh d\u1ea1ng JPG/PNG.'; }
  return '\u1ea2nh l\u1ed7i, kh\u00f4ng t\u1ea3i \u0111\u01b0\u1ee3c.';
}

function attachImg(id,inp){
  var files = inp && inp.files ? Array.prototype.slice.call(inp.files) : [];
  if(!files.length) return;
  var t=store.tasks[id]; if(!t) return;
  if(!Array.isArray(t.imgs)) t.imgs = t.img ? [t.img] : [];
  var MAX=5;
  var queue = files.slice(0, Math.max(0, MAX - t.imgs.length));
  if(queue.length < files.length) toast('T\u1ed1i \u0111a '+MAX+' \u1ea3nh');
  if(!queue.length){ if(inp) inp.value=''; return; }
  var done=0, total=queue.length, added=0, failed=0;
  function finish(){ done++; if(done<total) return;
    delete t.img; t.updated=todayStr(0); save();
    (t.kind==='display'?openDisplay:openTask)(id); render(); queuePush(id);
    if(added) toast('\u0110\u00e3 \u0111\u00ednh '+t.imgs.length+' \u1ea3nh');
    if(failed) toast(imgErrMsg('decode'));
    if(inp) inp.value=''; }
  queue.forEach(function(file){
    imgToJpegDataURL(file, 480, 0.6, function(data, reason){
      if(data){ t.imgs.push(data); added++; } else { failed++; }
      finish();
    });
  });
}
function removeImg(id,idx){
  var t=store.tasks[id]; if(!t) return;
  if(!Array.isArray(t.imgs)) t.imgs = t.img ? [t.img] : [];
  if(typeof idx==='number') t.imgs.splice(idx,1); else t.imgs=[];
  delete t.img;
  t.updated=todayStr(0); save();
  (t.kind==='display'?openDisplay:openTask)(id); render(); queuePush(id);
  toast('Đã xóa hình');
}

/* ---------- import parse ---------- */
function normH(h){return h.toLowerCase().replace(/\s+/g,' ').trim();}
function mapPrio(s){if(!s)return '—';s=s.toLowerCase();if(s.includes('gấp'))return 'Gấp';if(s.includes('trung'))return 'Trung bình';if(s.includes('bình'))return 'Bình thường';return '—';}
function doImport(){
  const raw=(document.getElementById('pasteBox').value||'').trim();
  if(!raw)return toast('Chưa có dữ liệu');
  const rows=raw.split(/\r?\n/).filter(r=>r.trim());
  if(rows.length<2)return toast('Cần header + ≥1 dòng task');
  const H=rows[0].split('\t').map(normH);const idx={};let dlSeen=0;
  H.forEach((h,i)=>{
    if(h.includes('task id'))idx.taskId=i;else if(h.includes('số phiếu'))idx.pdx=i;else if(h==='phiếu đề xuất')idx.pdxLink=i;
    else if(h.includes('người đề xuất'))idx.requester=i;else if(h.includes('chi nhánh'))idx.branch=i;
    else if(h.includes('tên sản phẩm'))idx.name=i;else if(h.includes('nội dung'))idx.detail=i;
    else if(h.includes('kích thước'))idx.size=i;else if(h.includes('mục đích'))idx.purpose=i;
    else if(h.includes('hình sản phẩm'))idx.imgLink=i;
    else if(h.includes('deadline')){if(dlSeen++===0)idx.deadline=i;}
    else if(h.includes('ưu tiên'))idx.prio=i;else if(h.includes('tiến độ'))idx.stage=i;else if(h.includes('ghi chú'))idx.note=i;
  });
  if(idx.taskId===undefined)return toast('Không thấy cột "Task ID"');
  let add=0,mrg=0;
  for(let r=1;r<rows.length;r++){const c=rows[r].split('\t');const id=(c[idx.taskId]||'').trim();if(!id)continue;
    const g=k=>idx[k]!==undefined?(c[idx[k]]||'').trim():'';
    const cur=store.tasks[id];
    if(cur){
      ['pdx','pdxLink','requester','branch','name','detail','size','purpose','imgLink','deadline'].forEach(k=>{const v=g(k);if(v)cur[k]=v;});
      if(g('prio')&&(!cur.prio||cur.prio==='—'))cur.prio=mapPrio(g('prio'));
      if(g('stage')&&cur.col==='intake')cur.col=bucket(g('stage'));
      if(g('note')&&!cur.note)cur.note=g('note');
      cur.demo=false;mrg++;
    }else{
      store.tasks[id]={taskId:id,pdx:g('pdx'),pdxLink:g('pdxLink'),requester:g('requester'),branch:g('branch'),
        name:g('name'),detail:g('detail'),size:g('size'),purpose:g('purpose'),imgLink:g('imgLink'),
        deadline:g('deadline'),prio:mapPrio(g('prio')),col:bucket(g('stage')),note:g('note'),stuck:false,demo:false};add++;
    }
  }
  save();render();closeDraw();toast(`+${add} mới · ${mrg} gộp`);
}
function copyUpdateTSV(){
  const A=arr().filter(t=>!t.demo&&t.kind!=='display');if(!A.length)return toast('Không có task thật');
  const lbl=c=>(COLS.find(x=>x.id===c)||{}).label||c;
  const head=['Task ID','Ưu tiên','Tiến độ','Trạng thái','Ghi chú'].join('\t');
  const lines=A.map(t=>[t.taskId,t.prio||'',lbl(t.col),isDone(t)?'Đã xong':isOverdue(t)?'Trễ':isStuck(t)?'Kẹt':'Đang chạy',t.note||''].join('\t'));
  navigator.clipboard.writeText([head,...lines].join('\n')).then(()=>toast('Đã copy '+A.length+' dòng — dán vào Sheet'),()=>toast('Trình duyệt chặn copy'));
}
function exportJSON(){const b=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='POSM_GLH_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Đã xuất JSON');}
function importJSONfile(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=e=>{try{const o=JSON.parse(e.target.result);if(!o.tasks)throw 0;if(o.replace)store.tasks={};Object.values(o.tasks).forEach(t=>{if(t.taskId){if(!t.col)t.col=bucket(t.stage);store.tasks[t.taskId]={...store.tasks[t.taskId],...t};}});ensureUpdated(store.tasks);save();render();closeDraw();saveAll();}catch(e){toast('JSON lỗi');}};rd.readAsText(f);}
function clearDemo(){arr().filter(t=>t.demo).forEach(t=>delete store.tasks[t.taskId]);save();render();closeDraw();toast('Đã xóa DEMO');}

/* ---------- xuất Excel: danh sách tiến độ gom theo ngày deadline ---------- */
function ds(){return new Date().toISOString().slice(0,10);}
function fmtD(d){const x=parseDate(d);if(!x)return '';const p=n=>(n<10?'0':'')+n;return p(x.getDate())+'/'+p(x.getMonth()+1)+'/'+x.getFullYear();}
function rowOf(t){const lbl=c=>(COLS.find(x=>x.id===c)||{}).label||c;
  const st=isDone(t)?'Đã xong':isOverdue(t)?'Trễ':isStuck(t)?'Kẹt':'Đang chạy';
  return [fmtD(t.deadline),t.taskId,t.branch||'',t.name||'',t.pdx||'',t.requester||'',lbl(t.col),t.prio||'',st,t.note||''];}
function exportExcel(){
  const A=arr().filter(t=>!t.demo&&t.kind!=='display');
  if(!A.length)return toast('Không có task thật để xuất');
  const withD=A.filter(t=>parseDate(t.deadline)).sort((a,b)=>parseDate(a.deadline)-parseDate(b.deadline));
  const noD=A.filter(t=>!parseDate(t.deadline));
  const header=['Ngày (deadline)','Task ID','Chi nhánh','Tên sản phẩm','PĐX','Người đề xuất','Khâu / tiến độ','Ưu tiên','Trạng thái','Ghi chú'];
  // fallback CSV nếu thư viện chưa load (mở offline không mạng)
  if(typeof XLSX==='undefined'){
    const all=[...withD,...noD];
    const csv=[header,...all.map(rowOf)].map(r=>r.map(c=>'"'+(''+c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const b=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');
    a.href=URL.createObjectURL(b);a.download='POSM_TienDo_'+ds()+'.csv';a.click();
    return toast('Đã xuất CSV (mở được bằng Excel)');
  }
  const aoa=[['BÁO CÁO TIẾN ĐỘ POSM — '+new Date().toLocaleDateString('vi-VN')],[],header];
  const merges=[{s:{r:0,c:0},e:{r:0,c:header.length-1}}];
  const keys=[...new Set(withD.map(t=>fmtD(t.deadline)))];
  keys.forEach(k=>{
    const r=aoa.length;aoa.push(['📅 '+k]);merges.push({s:{r,c:0},e:{r,c:header.length-1}});
    withD.filter(t=>fmtD(t.deadline)===k).forEach(t=>aoa.push(rowOf(t)));
  });
  if(noD.length){const r=aoa.length;aoa.push(['📅 Chưa có deadline']);merges.push({s:{r,c:0},e:{r,c:header.length-1}});noD.forEach(t=>aoa.push(rowOf(t)));}
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges']=merges;
  ws['!cols']=[{wch:15},{wch:11},{wch:18},{wch:36},{wch:7},{wch:14},{wch:16},{wch:12},{wch:11},{wch:32}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Tiến độ theo ngày');
  XLSX.writeFile(wb,'POSM_TienDo_'+ds()+'.xlsx');
  toast('Đã xuất file Excel');
}

/* ---------- lưu CHUNG trên web qua Netlify Blobs ---------- */
const API='/.netlify/functions/store';
let dirty=new Set(), pushT=null;
async function apiGet(){const r=await fetch(API,{cache:'no-store'});if(!r.ok)throw new Error('GET '+r.status);return r.json();}
async function apiPost(p){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});if(!r.ok)throw new Error('POST '+r.status);return r.json();}
function queuePush(id){if(store.tasks[id]&&store.tasks[id].demo)return;dirty.add(id);clearTimeout(pushT);pushT=setTimeout(flushDirty,400);}
function pushDelete(id){dirty.add('DEL:'+id);clearTimeout(pushT);pushT=setTimeout(flushDirty,200);}
async function flushDirty(){
  if(!dirty.size)return;
  const ids=[...dirty];dirty.clear();
  const upsert=ids.filter(x=>x.slice(0,4)!=='DEL:').map(id=>store.tasks[id]).filter(Boolean);
  const del=ids.filter(x=>x.slice(0,4)==='DEL:').map(x=>x.slice(4));
  try{await apiPost({upsert,delete:del});toast('✓ Đã lưu chung');}
  catch(e){ids.forEach(i=>dirty.add(i));toast('Chưa lưu được lên web — đã giữ tạm ở máy này');clearTimeout(pushT);pushT=setTimeout(flushDirty,5000);}
}
async function saveAll(){
  toast('Đang lưu…');
  try{await apiPost({upsert:arr().filter(t=>!t.demo)});toast('✓ Đã lưu tất cả lên web');}
  catch(e){toast('Không lưu được lên web: '+(e.message||e));}
}
async function pullShared(silent){
  try{const b=await apiGet();if(b&&b.tasks){mergeServer(b.tasks);save();render();}if(!silent)toast('Đã tải bản mới nhất');}
  catch(e){if(!silent)toast('Không tải được: '+(e.message||e));}
}
function mergeServer(serverTasks){
  const m={};
  Object.values(serverTasks||{}).forEach(t=>{if(t&&t.taskId){if(!t.col)t.col=bucket(t.stage);if(!t.updated)t.updated=todayStr(0);m[t.taskId]={...t,demo:false};}});
  store.tasks=m;
}
async function initShared(){
  try{
    const b=await apiGet();
    if(b&&b.tasks&&Object.keys(b.tasks).length){mergeServer(b.tasks);save();}
    else{await apiPost({upsert:arr().filter(t=>!t.demo)});}   /* lần đầu: nạp seed lên web */
  }catch(e){/* offline → dùng bản trong máy */}
  render();
}

/* ---------- tự nhập + tự phân loại ---------- */
let pending=[];
function detectBranch(s){const t=s.toLowerCase();
  if(/\bq2\b|quận 2|quan 2|thảo điền|thao dien/.test(t))return 'Quận 2';
  if(/\bq7\b|quận 7|quan 7/.test(t))return 'Quận 7';
  if(/\bq1\b|quận 1|quan 1/.test(t))return 'Quận 1';
  if(/thủ đức|thu duc/.test(t))return 'Thủ Đức';
  if(/đà nẵng|da nang/.test(t))return 'Đà Nẵng';
  return 'Không rõ';}
function detectPrio(s){const t=s.toLowerCase();
  if(/gấp|gap\b|urgent|asap|càng sớm|cang som|ưu tiên|uu tien/.test(t))return 'Gấp';
  if(/thong thả|thư thả|thu tha|không gấp|khong gap|từ từ|tu tu/.test(t))return 'Bình thường';
  return '—';}
function detectCol(s){const t=s.toLowerCase();
  if(/đã xong|da xong|hoàn thành|hoan thanh|\bxong\b|\bdone\b/.test(t))return 'done';
  if(/lắp đặt|lap dat|\bdán\b|treo|thi công|thi cong/.test(t))return 'install';
  if(/đang in|dang in|in ấn|in an|sản xuất|san xuat|đang sx/.test(t))return 'produce';
  if(/chờ duyệt|cho duyet|trình duyệt|trinh duyet|cần duyệt|can duyet|chờ approve/.test(t))return 'review';
  if(/đang design|dang design|đang làm|dang lam|đang thiết kế|dang thiet ke|đang xử lý|dang xu ly|in progress/.test(t))return 'design';
  return 'intake';}
function detectPerson(s){const m=s.match(/\b(?:ms|mr|chị|anh|cô|boss)\b\.?\s*[\p{Lu}][\p{L}]*/iu);return m?m[0].replace(/\s+/g,' ').trim():'';}
function classify(block){
  const text=block.trim();
  const first=(text.split(/\r?\n/)[0]||'').replace(/^\s*\d+[\.\)]\s*/,'').replace(/^\s*[-*•]\s*/,'').trim();
  const pdxM=text.match(/pdx\s*0*(\d+)/i);
  return {name:(first||'(task mới)').slice(0,100),detail:text,branch:detectBranch(text),
    prio:detectPrio(text),col:detectCol(text),
    pdx:pdxM?('PDX'+pdxM[1].padStart(3,'0')):'',requester:detectPerson(text),proposed:'',deadline:''};
}
function addLinesDirect(){
  const raw=(document.getElementById('addBox').value||'').trim();
  if(!raw)return toast('Chưa có nội dung');
  const lines=raw.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length)return toast('Chưa có dòng nào');
  const base=nextManualNum();
  const newIds=[];
  lines.forEach((line,i)=>{
    const id='M'+String(base+i).padStart(2,'0');
    store.tasks[id]={taskId:id,pdx:'',pdxLink:'',requester:'',branch:'Không rõ',
      name:line.slice(0,120),detail:'',size:'',purpose:'',proposed:'',deadline:'',
      prio:'—',col:'intake',note:'',updated:todayStr(0),stuck:false,demo:false};
    newIds.push(id);
  });
  pending=[];save();render();closeDraw();newIds.forEach(queuePush);
  toast('Đã thêm '+lines.length+' task');
}
function parseAdd(){
  const raw=(document.getElementById('addBox').value||'').trim();
  if(!raw){pending=[];renderPreview();return toast('Chưa có nội dung');}
  const blocks=/\n\s*\n/.test(raw)?raw.split(/\n\s*\n/):raw.split(/\r?\n/);
  pending=blocks.map(b=>b.trim()).filter(Boolean).map(classify);
  renderPreview();
}
function renderPreview(){
  const el=document.getElementById('addPreview');if(!el)return;
  if(!pending.length){el.innerHTML='<div class="hint">Chưa có task — gõ/dán rồi bấm <b>Phân loại</b>, hoặc bấm <b>＋ Nhập tay 1 task</b>.</div>';return;}
  const e=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  const brOpt=p=>BR_LIST.map(b=>`<option ${p.branch===b?'selected':''}>${b}</option>`).join('');
  const colOpt=p=>COLS.map(c=>`<option value="${c.id}" ${p.col===c.id?'selected':''}>${c.label}</option>`).join('');
  const prOpt=p=>PRIOS.map(x=>`<option ${p.prio===x?'selected':''}>${x}</option>`).join('');
  el.innerHTML=`<div class="hint" style="margin:4px 0 8px"><b>${pending.length}</b> task — kiểm tra & sửa rồi bấm Thêm:</div>`+
    pending.map((p,i)=>`<div class="pcard">
      <input class="pn" placeholder="Tên task / sản phẩm" value="${e(p.name)}" onchange="pending[${i}].name=this.value">
      <div class="pg3">
        <select onchange="pending[${i}].branch=this.value">${brOpt(p)}</select>
        <select onchange="pending[${i}].col=this.value">${colOpt(p)}</select>
        <select onchange="pending[${i}].prio=this.value">${prOpt(p)}</select>
      </div>
      <div class="pg3">
        <input placeholder="Người phụ trách" value="${e(p.requester)}" onchange="pending[${i}].requester=this.value">
        <input placeholder="Mã PĐX" value="${e(p.pdx)}" onchange="pending[${i}].pdx=this.value">
        <input placeholder="Deadline (vd 28/6/2026)" value="${e(p.deadline)}" onchange="pending[${i}].deadline=this.value">
      </div>
      <textarea placeholder="Nội dung chi tiết" onchange="pending[${i}].detail=this.value">${e(p.detail)}</textarea>
      <textarea placeholder="Ghi chú" onchange="pending[${i}].note=this.value">${e(p.note||'')}</textarea>
      <button class="rm" onclick="pending.splice(${i},1);renderPreview()">✕ Bỏ task này</button>
    </div>`).join('')+
    `<div style="display:flex;gap:8px;margin-top:8px"><button class="btn" onclick="addBlank()">＋ Thêm dòng</button><button class="btn primary" style="flex:1" onclick="commitAdd()">➕ Thêm ${pending.length} task vào board</button></div>`;

function addBlank(){pending.push({name:'',detail:'',branch:'Không rõ',prio:'—',col:'intake',pdx:'',requester:'',proposed:'',deadline:'',note:''});renderPreview();}

function commitAdd(){
  if(!pending.length)return toast('Chưa có task');

    store.tasks[id]={taskId:id,pdx:p.pdx||'',pdxLink:'',requester:p.requester||'',branch:p.branch||'Không rõ',
      name:p.name||'(task mới)',detail:p.detail||'',size:'',purpose:'',proposed:p.proposed||'',deadline:p.deadline||'',
      prio:p.prio||'—',col:p.col||'intake',note:p.note||'',updated:todayStr(0),stuck:false,demo:false};});
  Object.keys(store.tasks).filter(k=>/^M\d+$/.test(k)).forEach(()=>{});
  const newIds=[];for(let i=0;i<n;i++){newIds.push('M'+String(base+i).padStart(2,'0'));}
  pending=[];save();render();closeDraw();newIds.forEach(queuePush);toast('Đã thêm '+n+' task');
}

function ensureOrder(){
  const vals=Object.values(store.tasks); let needed=false;
  vals.forEach(t=>{ if(typeof t.order!=='number') needed=true; });
  if(needed){
    vals.sort((a,b)=>{const pa=(a.prio==='Gấp')?0:1,pb=(b.prio==='Gấp')?0:1;
      if(pa!==pb)return pa-pb;const da=daysLeft(a),db=daysLeft(b);
      return (da==null?9999:da)-(db==null?9999:db);});
    vals.forEach((t,i)=>{ if(typeof t.order!=='number') t.order=i*10; }); save();
  }
}

function quickParse(text){
  let s=' '+text.trim()+' ';
  const t={taskId:'',pdx:'',pdxLink:'',requester:'',branch:'',name:'',detail:'',
           prio:'—',col:'intake',note:'',proposed:'',deadline:'',stuck:false,demo:false,pdxImgs:[]};
  const brMap={q1:'Quận 1',q2:'Quận 2',q7:'Quận 7',td:'Thủ Đức',dn:'Đà Nẵng'};
  s=s.replace(/@(\S+)/g,(m,g)=>{const k=g.toLowerCase();
     t.branch=brMap[k]||(detectBranch(g)!=='Không rõ'?detectBranch(g):g);return ' ';});
  s=s.replace(/#(\S+)/g,(m,g)=>{const num=g.replace(/[^0-9]/g,'');
     t.pdx=num?('PDX'+num.padStart(3,'0')):g;return ' ';});
  s=s.replace(/!(\S+)/g,(m,g)=>{t.prio=detectPrio(g)!=='—'?detectPrio(g):
     (/g(ấ|a)p|urgent/i.test(g)?'Gấp':(/trung/i.test(g)?'Trung bình':'Bình thường'));return ' ';});
  s=s.replace(/link:(\S+)/i,(m,g)=>{t.pdxLink=g;return ' ';});
  s=s.replace(/(https?:\/\/\S+)/i,(m,g)=>{if(!t.pdxLink)t.pdxLink=g;return ' ';});
  const rest=s.replace(/\s+/g,' ').trim(); const parts=rest.split('|');
  t.name=(parts[0]||'(task mới)').trim().slice(0,120);
  t.detail=(parts.slice(1).join('|')||'').trim();
  return t;
}
function quickAdd(inputEl){

  store.tasks[id]=Object.assign(p,{taskId:id,order:mx+10,updated:todayStr(0)});
  save(); queuePush(id); inputEl.value='';
  if(view==='table'&&__tbl){ __tbl.addRow(store.tasks[id],false); } else { render(); }
  toast('Đã thêm: '+p.name);
}

function xlsReadFile(file){

    const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
    const rows=aoa.filter(r=>r.some(c=>(''+c).trim()!==''));
    if(rows.length<2){toast('Cần ≥1 header + 1 dòng dữ liệu');return;}
    __xlsHeaders=rows[0].map((h,i)=>(''+h).trim()||('Cột '+(i+1)));

    renderXlsMap();

  rd.readAsArrayBuffer(file);
}

function promoArr(){return Object.values(store.tasks).filter(function(t){return t.kind==='promo';});}
function promoMonths(){ if(!store.promoMonths||!store.promoMonths.length){store.promoMonths=['T11','T12','T01','T02','T03','T04','T05'];} return store.promoMonths; }
function nextPromoNum(){var m=0;Object.keys(store.tasks).forEach(function(k){var mm=/^P(\d+)$/.exec(k);if(mm)m=Math.max(m,+mm[1]);});return m+1;}
function ensurePromoSeed(){
  if(promoArr().length>0) return;
  var n=nextPromoNum();
  PROMO_SEED.promos.forEach(function(p){
    var id='P'+String(n++).padStart(3,'0');
    store.tasks[id]={taskId:id,kind:'promo',branch:p.branch,group:p.group,name:p.name,cond:p.cond||'',priceNew:p.priceNew||'',priceOld:p.priceOld||'',off:p.off||'',hours:p.hours||'',days:p.days||'',term:p.term||'',note:p.note||'',img:'',results:p.results||{},updated:todayStr(0)};
  });
  if(PROMO_SEED.months&&PROMO_SEED.months.length)store.promoMonths=PROMO_SEED.months.slice();
  save();
  promoArr().forEach(function(t){queuePush(t.taskId);});
}
function pPass(t){
  if(pfilter.branch&&t.branch!==pfilter.branch)return false;
  if(pfilter.group&&t.group!==pfilter.group)return false;
  if(pfilter.q){var h=[t.taskId,t.branch,t.group,t.name,t.cond,t.note].join(' ').toLowerCase();if(!h.includes(pfilter.q.toLowerCase()))return false;}
  return true;
}
function renderPromos(){
  var wrap=document.getElementById('promoWrap');if(!wrap)return;
  ensurePromoSeed();
  var A=promoArr();
  var months=promoMonths();
  var branches=[''].concat(Array.from(new Set(A.map(function(t){return t.branch;}))));
  var groups=[''].concat(Array.from(new Set(A.filter(function(t){return !pfilter.branch||t.branch===pfilter.branch;}).map(function(t){return t.group;}))));

  var grOpt=groups.map(function(g){return '<option value="'+esc2(g)+'"'+(pfilter.group===g?' selected':'')+'>'+(g||'Tất cả nhóm DV')+'</option>';}).join('');
  document.getElementById('pCtrl').innerHTML=

    '<select onchange="pfilter.group=this.value;renderPromos()">'+grOpt+'</select>'+
    '<button class="btn" onclick="addPromo()">＋ Thêm dòng</button>'+

    cells+=PROMO_COLS.map(function(c){

  var d=Math.floor((Date.now()-ts)/1000);

  var m=Math.floor(d/60); if(m<60) return m+' phút trước';
  var h=Math.floor(m/60); if(h<24) return h+' giờ trước';
  var day=Math.floor(h/24); return day+' ngày trước';
}

function __cmtUser(){ try{ var s=JSON.parse(localStorage.getItem('posm_session')); return (s&&s.name)?s.name:'Ai do'; }catch(e){ return 'Ai do'; } }
function cmtCount(t){ try{ return (t&&Array.isArray(t.comments))?t.comments.length:0; }catch(e){ return 0; } }
function __cmtTime(ts){ try{ var d=new Date(ts); var p=n=>('0'+n).slice(-2); return p(d.getDate())+'/'+p(d.getMonth()+1)+' '+p(d.getHours())+':'+p(d.getMinutes()); }catch(e){ return ''; } }
function __cmtLinkify(s){
  var esc=__esc(s||'');
  try{
    var __cands=[];
    (typeof ACCOUNTS!=='undefined'?ACCOUNTS:[]).forEach(function(a){
      var __labs=[a.name]; if(typeof __nicknames!=='undefined' && __nicknames[a.u]) __labs.push(__nicknames[a.u]);
      __labs.forEach(function(lb){ if(lb) __cands.push({u:a.u, e:__esc(lb)}); });
    });
    __cands.sort(function(x,y){ return y.e.length-x.e.length; });
    var __out=''; var __i=0;
    while(__i<esc.length){
      var __ch=esc.charAt(__i);
      if(__ch==='@'){
        var __prev=__i>0?esc.charAt(__i-1):'';
        var __bd=!/[A-Za-zÀ-ỹ0-9]/.test(__prev);
        var __rest=esc.slice(__i+1);
        var __mt=null;
        if(__bd){
          for(var __k=0;__k<__cands.length;__k++){
            var __e=__cands[__k].e;
            if(__rest.slice(0,__e.length).toLowerCase()===__e.toLowerCase()){
              var __af=__rest.charAt(__e.length);
              if(!/[A-Za-zÀ-ỹ0-9]/.test(__af)){ __mt=__cands[__k]; break; }
            }
          }
        }
        if(__mt){ __out+='<span class="cmtMention" data-u="'+__esc(__mt.u)+'">@'+__mt.e+'</span>'; __i+=1+__mt.e.length; continue; }
        if(__bd){
          var __mm=__rest.match(/^([A-Za-zÀ-ỹ0-9]+(?:\s[A-Za-zÀ-ỹ0-9]+)?)/);
          if(__mm){ __out+='<span class="cmtMention">@'+__mm[1]+'</span>'; __i+=1+__mm[1].length; continue; }
        }
        __out+='@'; __i++; continue;
      }
      __out+=__ch; __i++;
    }
    esc=__out;
  }catch(__e){}
  esc=esc.replace(/(https?:\/\/[^\s<]+)/g,function(u){
    if(/\.(png|jpe?g|gif|webp|bmp|svg)(\?|$)/i.test(u)) return '<br><img class="cmtImg" src="'+u+'" onclick="window.open(this.src,\'_blank\')">';
    return '<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>';
  });
  return esc.replace(/\n/g,'<br>');
}
function __cmtNode(id, c, depth){
  var me=__cmtUser();
  var mine=(c.by===me);
  var pad=Math.min(depth,4)*18;
  var acts='<button class="cmtAct" onclick="cmtReply(\''+id+'\',\''+c.cid+'\')">Tra loi</button>';
  if(mine){ acts+='<button class="cmtAct" onclick="cmtEdit(\''+id+'\',\''+c.cid+'\')">Sua</button><button class="cmtAct del" onclick="cmtDel(\''+id+'\',\''+c.cid+'\')">Xoa</button>'; }
  var edited=c.edited?' <i style="color:var(--muted)">(da sua)</i>':'';
  var html='<div class="cmtItem" style="margin-left:'+pad+'px" data-cid="'+c.cid+'">'
    +'<div class="cmtHead"><b>'+__esc((function(){var a=(typeof __accByAny==='function'?__accByAny(c.by):null); return a?__accName(a.u):c.by;})())+'</b><span class="cmtTime">'+__cmtTime(c.at)+edited+'</span></div>'
    +'<div class="cmtBody">'+__cmtLinkify(c.text)+'</div>'
    +'<div class="cmtActs">'+acts+'</div></div>';
  return html;
}
function __cmtTree(id){
  var t=store.tasks[id]; if(!t||!Array.isArray(t.comments)) return '<div class="cmtEmpty">Chua co nhan xet nao.</div>';
  var byParent={}; t.comments.forEach(function(c){ var p=c.parent||''; (byParent[p]=byParent[p]||[]).push(c); });
  var out='';
  (function walk(parent,depth){
    var arr=byParent[parent]||[]; arr.sort(function(a,b){return (a.at||0)-(b.at||0);});
    arr.forEach(function(c){ out+=__cmtNode(id,c,depth); walk(c.cid,depth+1); });
  })('',0);
  return out||'<div class="cmtEmpty">Chua co nhan xet nao.</div>';
}

function cmtDel(id,cid){
  var t=store.tasks[id]; if(!t||!Array.isArray(t.comments)) return;
  var c=t.comments.find(function(x){return x.cid===cid;});
  if(!c||c.by!==__cmtUser()){ toast('Chi xoa duoc nhan xet cua minh'); return; }
  if(!confirm('Xoa nhan xet nay?')) return;
  var rm={}; rm[cid]=1; var changed=true;
  while(changed){ changed=false; t.comments.forEach(function(x){ if(x.parent&&rm[x.parent]&&!rm[x.cid]){ rm[x.cid]=1; changed=true; } }); }
  t.comments=t.comments.filter(function(x){ return !rm[x.cid]; });
  t.updated=todayStr(0); save(); queuePush(id);
  renderComments(id); var cc=document.getElementById('cmtCnt'); if(cc) cc.textContent=cmtCount(t);
}
function cmtSend(id){
  var ta=document.getElementById('cmtInput'); if(!ta) return;
  var txt=(ta.value||'').trim(); if(!txt){ return; }
  var t=store.tasks[id]; if(!t) return;
  if(!Array.isArray(t.comments)) t.comments=[];
  var st=__cmtReplyState||{};
  if(st.edit){
    var c=t.comments.find(function(x){return x.cid===st.edit;});
    if(c&&c.by===__cmtUser()){ c.text=txt; c.edited=true; c.at2=Date.now(); }
  } else {
    t.comments.push({ cid:'c'+Date.now()+Math.random().toString(36).slice(2,6), by:__cmtUser(), text:txt, at:Date.now(), parent:(st.parent||'') });
  }
  t.updated=todayStr(0); save(); queuePush(id);
  /* === Thong bao khi bi @tag: nhay thang toi dung binh luan === */
  try{
    var _cid = (st.edit)? st.edit : (t.comments.length? t.comments[t.comments.length-1].cid : '');
    var _mts = []; var _re=/@([A-Za-zÀ-ỹ0-9]+(?:\s[A-Za-zÀ-ỹ0-9]+)?)/g, _mm;
    while((_mm=_re.exec(txt))!==null){ var _acc=(typeof __accByAny==='function'?__accByAny(_mm[1]):null); if(_acc && _mts.indexOf(_acc.u)<0) _mts.push(_acc.u); }
    var _me=(typeof __curUserObj==='function'?__curUserObj():null);
    _mts = _mts.filter(function(u){ return !_me || u!==_me.u; });
    if(_mts.length && typeof __pendingActs!=='undefined'){
      __pendingActs.push({ type:'mention', id:id, taskId:id, cid:_cid, to:_mts, name:(typeof __taskLabel==='function'?__taskLabel(id):id), by:__cmtUser(), at:Date.now() });
    }
  }catch(e){}
  cmtCancelReply();
  renderComments(id);
  var cc=document.getElementById('cmtCnt'); if(cc) cc.textContent=cmtCount(t);
}
function cmtOnType(ta){
  var v=ta.value, pos=ta.selectionStart||v.length;
  var upto=v.slice(0,pos); var m=upto.match(/@([A-Za-zÀ-ỹ0-9 ]*)$/);
  var menu=document.getElementById('cmtMenu'); if(!menu) return;
  if(!m){ menu.style.display='none'; return; }
  var q=(m[1]||'').toLowerCase();
  var names=(typeof __mentionNames==='function'?__mentionNames():(typeof ACCOUNTS!=='undefined'?ACCOUNTS.map(function(a){return a.name;}):[]));
  var hit=names.filter(function(n){ return n.toLowerCase().indexOf(q)>=0; });
  if(!hit.length){ menu.style.display='none'; return; }
  menu.innerHTML=hit.map(function(n){ return '<div class="cmtMi" onclick="cmtPickMention(\''+n.replace(/'/g,"\\'")+'\')">@'+__esc(n)+'</div>'; }).join('');
  menu.style.display='block';
}
function cmtPickMention(name){
  var ta=document.getElementById('cmtInput'); if(!ta) return;
  var v=ta.value, pos=ta.selectionStart||v.length;
  var before=v.slice(0,pos).replace(/@([A-Za-zÀ-ỹ0-9 ]*)$/,'@'+name+' ');
  ta.value=before+v.slice(pos);
  document.getElementById('cmtMenu').style.display='none';
  ta.focus();
}
function cmtToggleEmoji(){
  var box=document.getElementById('cmtEmojiBox'); if(!box) return;
  if(box.style.display==='none'){
    var es=['👍','❤️','😀','😂','😮','😢','🎉','🔥','✅','❌','⚠️','🙏','👏','💡','📌','🚀'];
    box.innerHTML=es.map(function(e){ return '<span class="cmtEmojiItem" onclick="cmtAddEmoji(\''+e+'\')">'+e+'</span>'; }).join('');
    box.style.display='flex';
  } else { box.style.display='none'; }
}
function cmtAddEmoji(e){
  var ta=document.getElementById('cmtInput'); if(!ta) return;
  var pos=ta.selectionStart||ta.value.length;
  ta.value=ta.value.slice(0,pos)+e+ta.value.slice(pos);
  ta.focus(); document.getElementById('cmtEmojiBox').style.display='none';
}

var __notifTimer = null;
function gotoTask(id, cid){
  if(!id) return;
  // Tu chuyen sang dung view (POSM / Standee-Tentcard-TV / Promo / Bang) chua task truoc khi cuon toi
  try{
    var _tk = (typeof store!=='undefined' && store.tasks) ? store.tasks[id] : null;
    if(_tk && typeof switchView==='function'){
      var _want = (_tk.kind==='display') ? 'display' : (_tk.kind==='promo' ? 'promo' : 'posm');
      if(typeof view==='undefined' || view!==_want){ switchView(_want); }
    }
  }catch(e){}
  // đóng panel thông báo
  var p = document.getElementById('notifPanel'); if(p) p.classList.remove('on');
  // đánh dấu đã đọc để badge không còn nhấp nháy
  try{ clearNotifUnread(); }catch(e){}
  // tìm card theo data-id (thử vài lần vì board có thể đang render lại)
  var tries = 0;
  (function find(){
    var _eid = (window.CSS && CSS.escape ? CSS.escape(id) : id); var card = document.querySelector('.card[data-id="'+ _eid +'"], tr[data-id="'+ _eid +'"]');
    if(!card && tries < 20){ tries++; return setTimeout(find, 150); }
    if(!card){ if(typeof toast==='function') toast('Không tìm thấy thay đổi này trên bảng'); return; }
    // cuộn tới giữa màn hình
    card.scrollIntoView({behavior:'smooth', block:'center', inline:'center'});
    // gỡ highlight cũ (nếu có) rồi bật highlight mới
    document.querySelectorAll('.card.notif-target').forEach(function(c){ c.classList.remove('notif-target'); });
    if(__notifTimer){ clearTimeout(__notifTimer); }
    card.classList.add('notif-target');
    if(cid){
      try{ if(typeof openTask==='function') openTask(id); }catch(e){}
      (function jumpCmt(tri){
        var cel = document.querySelector('#drawBody [data-cid="'+(window.CSS&&CSS.escape?CSS.escape(cid):cid)+'"]');
        if(!cel && tri<25){ return setTimeout(function(){ jumpCmt(tri+1); }, 120); }
        if(!cel) return;
        try{ cel.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){}
        document.querySelectorAll('.cmtItem.notif-target,[data-cid].notif-target').forEach(function(x){ x.classList.remove('notif-target'); });
        cel.classList.add('notif-target');
        setTimeout(function(){ cel.classList.remove('notif-target'); }, 3200);
      })(0);
    }
    __notifTimer = setTimeout(function(){ card.classList.remove('notif-target'); __notifTimer = null; }, 3000);
  })();
}
window.gotoTask = gotoTask;
// Dong panel khi bam ra ngoai
document.addEventListener('click', function(ev){
  // Bấm vào một mục thông báo -> nhảy tới thay đổi đó
  var item = ev.target.closest && ev.target.closest('.notifItem');
  if(item && item.getAttribute('data-goto')){
    ev.preventDefault(); ev.stopPropagation();
    gotoTask(item.getAttribute('data-goto'), item.getAttribute('data-cid')||'');
    return;
  }
  var w = ev.target.closest && ev.target.closest('.notifWrap');
  if(!w){ var p = document.getElementById('notifPanel'); if(p) p.classList.remove('on'); }
});
// Cap nhat thoi gian tuong doi moi 30s
setInterval(function(){ var p=document.getElementById('notifPanel'); if(p&&p.classList.contains('on')) renderNotif(); }, 30000);
// Tu dong dong bo tu server moi 12s (khong can bam Tai moi)
setInterval(function(){ try{ if(typeof pullShared==='function') pullShared(true); }catch(e){} }, 12000);
// Tai lan dau
setTimeout(function(){ try{ pullShared(true); }catch(e){} }, 1500);

/* === Sap xep card theo: uu tien (gap/ket) truoc, roi thoi gian cap nhat moi nhat === */
// Gan m2c thoi gian cap nhat cho task moi khi bi sua (bang cach boc them queuePush)
if(typeof queuePush==='function' && !queuePush.__tsStamp){
  var __qpForTs = queuePush;
  queuePush = function(id){
    try{ if(typeof board!=='undefined' && board.tasks && board.tasks[id]){ board.tasks[id]._ts = Date.now(); } }catch(e){}
    return __qpForTs.apply(this, arguments);
  };
  queuePush.__tsStamp = true;
  queuePush.__wrapped = true;
  window.queuePush = queuePush;
}

// Xep hang uu tien tu class cua card: urgent = 0, stuck = 1, thuong = 2
function __cardTier(card){
  if(card.classList.contains('urgent')) return 0;
  if(card.classList.contains('stuck'))  return 1;
  return 2;
}
// Lay m2c thoi gian _ts cua task tu data-id (khong co thi = 0 -> xuong cuoi)
function __cardTs(card){
  try{
    var id = card.getAttribute('data-id');
    if(id && typeof board!=='undefined' && board.tasks && board.tasks[id] && board.tasks[id]._ts){
      return board.tasks[id]._ts;
    }
  }catch(e){}
  return 0;
}
// Sap xep lai card trong tung cot: uu tien truoc, roi _ts giam dan (moi nhat len tren)
function __applySort(){
  try{
    document.querySelectorAll('.colbody').forEach(function(body){
      var cards = Array.prototype.slice.call(body.querySelectorAll(':scope > .card'));
      if(cards.length<2) return;
      cards.sort(function(x,y){
        var tx=__cardTier(x), ty=__cardTier(y);
        if(tx!==ty) return tx-ty;               // uu tien truoc
        return __cardTs(y) - __cardTs(x);        // moi nhat len tren
      });
      cards.forEach(function(c){ body.appendChild(c); });
    });
  }catch(e){}
}

// Boc render() de tu dong sap xep lai sau moi lan ve board
if(typeof render==='function' && !render.__sortWrapped){
  var __origRender = render;
  render = function(){
    var r = __origRender.apply(this, arguments);
    __applySort();
    return r;
  };
  render.__sortWrapped = true;
  window.render = render;
}

boot();
</script>
