<script id="ctkm-dash-js">
(function(){
  'use strict';
  function api(){return window.CTKMNUM;}
  var SLOTS=[{k:'s9',label:'9h-11h'},{k:'s12',label:'12h-19h'},{k:'s19',label:'19h-24h'}];
  function toISO(dmy){var m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(dmy);return m?m[3]+'-'+m[2]+'-'+m[1]:dmy;}
  function dayNum(dmy){var m=/^(\d{2})\//.exec(dmy);return m?parseInt(m[1],10):0;}
  var COLORS=['#2563eb','#16a34a','#dc2626','#d97706','#7c3aed'];

  function hssvMonths(){var d=api().ensureSeed();return ['T5','T6','T7'].filter(function(m){return d.hssv[m]&&d.hssv[m].length;});}
  function metricVal(prog,r,metric){
    if(prog==='promo'){ if(metric==='sl')return r.sl; if(metric==='tk')return r.tk; if(metric==='moi')return r.moi; return null; }
    // hssv
    if(metric==='totHSSV')return r.totHSSV;
    if(metric==='totKhach')return r.totKhach;
    if(metric==='rate')return (r.totHSSV&&r.totKhach)?(r.totHSSV/r.totKhach*100):null;
    if(metric==='hssv_am')return (r.s9&&+r.s9.sl)||0;
    if(metric==='hssv_rest')return ((r.s12&&+r.s12.sl)||0)+((r.s19&&+r.s19.sl)||0);
    // per-slot sl sum handled elsewhere
    return null;
  }

  function ensureDashUI(){
    var wrap=document.getElementById('ctkmNumWrap'); if(!wrap)return;
    if(document.getElementById('cnDashCard'))return;
    var card=document.createElement('div'); card.className='cn-card'; card.id='cnDashCard';
    card.innerHTML=''
      +'<h3 class="cn-h">Dashboard tăng trưởng</h3>'
      +'<div class="cn-row" style="margin-bottom:6px">'
      +'<div class="cn-f"><label>Chương trình</label><select id="d_prog"><option value="hssv">HSSV</option><option value="promo">Chương trình tối</option></select></div>'
      +'<div class="cn-f"><label>Chỉ số</label><select id="d_metric"></select></div>'
      +'<div class="cn-f"><label>Kiểu so sánh</label><select id="d_mode"><option value="months">So sánh cùng kỳ các tháng (theo ngày trong tháng)</option><option value="series">Chuỗi theo ngày (1 tháng)</option></select></div>'
      +'<div class="cn-f" id="d_monthWrap" style="display:none"><label>Tháng</label><select id="d_month"></select></div>'
      +'</div>'
      +'<div id="d_chart"></div>'
      +'<div id="d_legend" class="cn-legend"></div>'
      +'<div id="d_stat" class="cn-hint"></div>';
    wrap.appendChild(card);
    ensurePieUI();
    document.getElementById('d_prog').addEventListener('change',function(){fillMetric();fillMonth();draw();});
    document.getElementById('d_metric').addEventListener('change',draw);
    document.getElementById('d_mode').addEventListener('change',function(){toggleMonth();draw();});
    document.getElementById('d_month').addEventListener('change',draw);
    fillMetric();fillMonth();toggleMonth();draw();
  }
  function fillMetric(){
    var prog=document.getElementById('d_prog').value;
    var opts = prog==='hssv'
      ? [['totHSSV','Tổng HSSV/ngày'],['totKhach','Tổng khách/ngày'],['rate','Tỷ lệ HSSV (%)'],['hssv_am','HSSV khung 9h-12h'],['hssv_rest','HSSV khung giờ còn lại']]
      : [['sl','Số khách gói'],['tk','Tổng khách'],['moi','% Mới']];
    document.getElementById('d_metric').innerHTML=opts.map(function(o){return '<option value="'+o[0]+'">'+o[1]+'</option>';}).join('');
  }
  function fillMonth(){
    var prog=document.getElementById('d_prog').value;
    var months = prog==='hssv'?hssvMonths():['T6','T7'];
    document.getElementById('d_month').innerHTML=months.map(function(m){return '<option value="'+m+'">Tháng '+m.slice(1)+'</option>';}).join('');
  }
  function toggleMonth(){
    var mode=document.getElementById('d_mode').value;
    document.getElementById('d_monthWrap').style.display = mode==='series'?'flex':'none';
  }
  function getMonthRows(prog,mon){
    var d=api().ensureSeed();
    if(prog==='hssv')return (d.hssv[mon]||[]);
    var blk=d.promo[mon]; return blk&&blk.rows||[];
  }

  function draw(){
    var prog=document.getElementById('d_prog').value;
    var metric=document.getElementById('d_metric').value;
    var mode=document.getElementById('d_mode').value;
    var series=[]; // {name,color,points:[{x,y}]}
    if(mode==='months'){
      var months = prog==='hssv'?hssvMonths():['T6','T7'];
      months.forEach(function(m,mi){
        var rows=getMonthRows(prog,m);
        var pts=rows.map(function(r){var y=metricVal(prog,r,metric);return (y==null)?null:{x:dayNum(r.date),y:y};}).filter(Boolean);
        pts.sort(function(a,b){return a.x-b.x;});
        var lbl='Tháng '+m.slice(1); if(prog==='promo')lbl+=(m==='T7'?' (139k)':' (110k)');
        series.push({name:lbl,color:COLORS[mi%COLORS.length],points:pts});
      });
    }else{
      var mon=document.getElementById('d_month').value;
      var rows=getMonthRows(prog,mon).slice().sort(function(a,b){return toISO(a.date)<toISO(b.date)?-1:1;});
      var pts=rows.map(function(r){var y=metricVal(prog,r,metric);return (y==null)?null:{x:dayNum(r.date),y:y};}).filter(Boolean);
      series.push({name:'Tháng '+mon.slice(1),color:COLORS[0],points:pts});
    }
    renderChart(series);
  }

  function renderChart(series){
    var W=980,H=340,pad={l:48,r:16,t:16,b:34};
    var allX=[],allY=[];
    series.forEach(function(s){s.points.forEach(function(p){allX.push(p.x);allY.push(p.y);});});
    var host=document.getElementById('d_chart');
    if(!allX.length){host.innerHTML='<div class="cn-hint" style="padding:20px">Chưa có dữ liệu để vẽ.</div>';document.getElementById('d_legend').innerHTML='';document.getElementById('d_stat').textContent='';return;}
    var minX=Math.min.apply(null,allX),maxX=Math.max.apply(null,allX);
    var minY=0,maxY=Math.max.apply(null,allY); if(maxY===minY)maxY=minY+1;
    function X(x){return pad.l+(maxX===minX?0:(x-minX)/(maxX-minX))*(W-pad.l-pad.r);}
    function Y(y){return H-pad.b-(y-minY)/(maxY-minY)*(H-pad.t-pad.b);}
    var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;background:#fff">';
    // y gridlines
    for(var i=0;i<=4;i++){var yv=minY+(maxY-minY)*i/4;var yy=Y(yv);svg+='<line x1="'+pad.l+'" y1="'+yy+'" x2="'+(W-pad.r)+'" y2="'+yy+'" stroke="#eee"/><text x="'+(pad.l-6)+'" y="'+(yy+4)+'" font-size="11" fill="#888" text-anchor="end">'+Math.round(yv)+'</text>';}
    // x axis labels (days)
    for(var d=minX;d<=maxX;d+=Math.max(1,Math.ceil((maxX-minX)/12))){svg+='<text x="'+X(d)+'" y="'+(H-pad.b+16)+'" font-size="10" fill="#888" text-anchor="middle">'+d+'</text>';}
    series.forEach(function(s){
      if(!s.points.length)return;
      var dpath=s.points.map(function(p,i){return (i?'L':'M')+X(p.x).toFixed(1)+' '+Y(p.y).toFixed(1);}).join(' ');
      svg+='<path d="'+dpath+'" fill="none" stroke="'+s.color+'" stroke-width="2"/>';
      s.points.forEach(function(p){svg+='<circle cx="'+X(p.x).toFixed(1)+'" cy="'+Y(p.y).toFixed(1)+'" r="2.5" fill="'+s.color+'"/>';});
    });
    svg+='</svg>';
    host.innerHTML=svg;
    document.getElementById('d_legend').innerHTML=series.map(function(s){return '<span class="cn-leg"><i style="background:'+s.color+'"></i>'+s.name+'</span>';}).join('');
    // growth stat: compare first vs last month totals if months mode
    var stat='';
    if(series.length>=2){
      function sum(s){return s.points.reduce(function(a,p){return a+p.y;},0);}
      var a=sum(series[0]),b=sum(series[series.length-1]);
      if(a>0){var g=((b-a)/a*100);stat='Tổng '+series[0].name+': '+Math.round(a)+' → '+series[series.length-1].name+': '+Math.round(b)+' ('+(g>=0?'+':'')+g.toFixed(1)+'%)';}
    }
    document.getElementById('d_stat').textContent=stat;
  }
    var PIE_COLORS=['#4f46e5','#16a34a','#f59e0b'];
  function pieMonths(){var d=api().ensureSeed();var out=[];['T5','T6','T7'].forEach(function(m){var has=(d.hssv[m]&&d.hssv[m].length)||(d.promo[m]&&d.promo[m].rows&&d.promo[m].rows.length);if(has)out.push(m);});return out;}
  function computePie(mon){
    var d=api().ensureSeed();
    var hRows=d.hssv[mon]||[];
    var hssv=0,guests=0;
    hRows.forEach(function(r){hssv+=(+r.totHSSV||0);guests+=(+r.totKhach||0);});
    var pBlk=d.promo[mon];var pRows=(pBlk&&pBlk.rows)||[];
    var prog=0;pRows.forEach(function(r){prog+=(+r.sl||0);});
    var khac=guests-hssv;if(khac<0)khac=0;
    return [{name:'HSSV',value:hssv},{name:'Chương trình 139k',value:prog},{name:'Khác',value:khac}];
  }
  function drawPie(mon){
    var host=document.getElementById('d_pie');if(!host)return;
    var data=computePie(mon);var total=data.reduce(function(a,x){return a+x.value;},0);
    var pm=document.getElementById('d_pieMonths');
    if(pm){[].forEach.call(pm.querySelectorAll('.cn-pbtn'),function(b){b.classList.toggle('active',b.getAttribute('data-m')===mon);});}
    if(!total){host.innerHTML='<div class="cn-hint" style="padding:16px">Chưa có dữ liệu để vẽ biểu đồ tròn.</div>';return;}
    var cx=110,cy=110,r=100,ang=-Math.PI/2;var paths='';
    data.forEach(function(seg,i){
      if(!seg.value)return;var frac=seg.value/total;var a2=ang+frac*Math.PI*2;
      var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
      var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
      var large=frac>0.5?1:0;
      if(frac>=0.999){paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+PIE_COLORS[i]+'"></circle>';}
      else{paths+='<path d="M'+cx+' '+cy+' L'+x1.toFixed(2)+' '+y1.toFixed(2)+' A'+r+' '+r+' 0 '+large+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)+' Z" fill="'+PIE_COLORS[i]+'"></path>';}
      ang=a2;
    });
    var svg='<svg viewBox="0 0 220 220" style="width:220px;height:220px">'+paths+'<circle cx="'+cx+'" cy="'+cy+'" r="46" fill="#fff"></circle><text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="13" fill="#666">Tổng khách</text><text x="'+cx+'" y="'+(cy+16)+'" text-anchor="middle" font-size="18" font-weight="700" fill="#111">'+total+'</text></svg>';
    var legend='<div class="cn-pie-legend">'+data.map(function(seg,i){var p=total?(seg.value/total*100):0;return '<div class="cn-pleg"><i style="background:'+PIE_COLORS[i]+'"></i><span>'+seg.name+': <b>'+seg.value+'</b> ('+p.toFixed(1).replace('.',',')+'%)</span></div>';}).join('')+'</div>';
    host.innerHTML='<div class="cn-pie-wrap">'+svg+legend+'</div>';
  }
  function ensurePieUI(){
    var wrap=document.getElementById('ctkmNumWrap');if(!wrap)return;
    if(document.getElementById('cnPieCard'))return;
    var card=document.createElement('div');card.className='cn-card';card.id='cnPieCard';
    var months=pieMonths();if(!months.length)months=['T7'];

<script id="cn-layout-export">
(function(){
  'use strict';
  var WRAP='ctkmNumWrap';
  var ORDER=['cnDashCard','cnPieCard','cnTableCard','cn-entry-hssv','cn-entry-promo'];

  function cardKey(el){
    if(el.id && ORDER.indexOf(el.id)>=0) return el.id;
    if(el.classList){
      if(el.classList.contains('cn-entry-hssv')) return 'cn-entry-hssv';
      if(el.classList.contains('cn-entry-promo')) return 'cn-entry-promo';
    }
    return null;
  }
  function reorder(){
    var wrap=document.getElementById(WRAP); if(!wrap) return false;
    var cards=[].slice.call(wrap.children);
    var present=cards.map(cardKey).filter(Boolean);
    var need=['cnDashCard','cnPieCard','cnTableCard'];
    var ready=need.every(function(k){return present.indexOf(k)>=0;});
    if(!ready) return false;
    ORDER.forEach(function(key){
      var el=cards.filter(function(c){return cardKey(c)===key;})[0];
      if(el) wrap.appendChild(el);
    });
    return true;
  }

  function api(){ return window.CTKMNUM || null; }
  function getData(){
    var prog=(document.getElementById('d_prog')||{}).value||'hssv';
    var mon=(document.getElementById('d_month')||{}).value||'';
    var a=api();
    var rows=[];
    if(a && a.ensureSeed){
      var d=a.ensureSeed();
      if(prog==='hssv') rows=(d.hssv[mon]||[]).slice();
      else { var blk=d.promo[mon]; rows=(blk&&blk.rows||[]).slice(); }
    }
    return {prog:prog, mon:mon, rows:rows};
  }
  function tableForExport(){
    var g=getData(), prog=g.prog, rows=g.rows;
    var out=[];
    if(prog==='hssv'){
      out.push(['Ngày','Thứ','Khung','Số HSSV','% Mới','% Cũ','Tổng khách']);
      rows.forEach(function(r){
        ['s9','s12','s19'].forEach(function(k,idx){
          var lbl=['9h-11h','12h-19h','19h-24h'][idx];
          var o=r[k]||{};
          out.push([r.date||'', r.thu||'', lbl, o.sl==null?'':o.sl, o.moi==null?'':o.moi, o.cu==null?'':o.cu, o.tk==null?'':o.tk]);
        });
      });
    } else {
      out.push(['Ngày','Thứ','Khung','Số khách gói','% Mới','% Cũ','Tổng khách']);
      rows.forEach(function(r){
        out.push([r.date||'', r.thu||'', '21h-24h', r.sl==null?'':r.sl, r.moi==null?'':r.moi, r.cu==null?'':r.cu, r.tk==null?'':r.tk]);
      });
    }
    return out;
  }
  function fname(ext){ var g=getData(); return 'BaoCao_'+(g.prog==='hssv'?'HSSV':'ChuongTrinh')+'_'+(g.mon||'')+'.'+ext; }

  function exportExcel(){
    if(typeof XLSX==='undefined'){ alert('Thư viện Excel chưa sẵn sàng.'); return; }
    var aoa=tableForExport();
    var ws=XLSX.utils.aoa_to_sheet(aoa);
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'BaoCao');
    XLSX.writeFile(wb, fname('xlsx'));
  }

  function svgToCanvas(scale){
    scale=scale||2;
    var host=document.getElementById('d_chart');
    var svg=host? host.querySelector('svg') : null;
    if(!svg) return Promise.reject('Không tìm thấy biểu đồ.');
    var rect=svg.getBoundingClientRect();
    var w=Math.max(1,Math.round(rect.width||svg.clientWidth||600));
    var h=Math.max(1,Math.round(rect.height||svg.clientHeight||360));
    var clone=svg.cloneNode(true);
    clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
    if(!clone.getAttribute('width')) clone.setAttribute('width', w);
    if(!clone.getAttribute('height')) clone.setAttribute('height', h);
    var data=new XMLSerializer().serializeToString(clone);
    var svg64='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(data);
    return new Promise(function(res,rej){
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');
        c.width=w*scale; c.height=h*scale;
        var ctx=c.getContext('2d');
        ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,c.width,c.height);
        ctx.drawImage(img,0,0,c.width,c.height);
        res(c);
      };
      img.onerror=function(){ rej('Không thể tải biểu đồ.'); };
      img.src=svg64;
    });
  }

  function exportPNG(){
    svgToCanvas(2).then(function(canvas){
      var a=document.createElement('a');
      a.href=canvas.toDataURL('image/png');
      a.download=fname('png');
      document.body.appendChild(a); a.click(); a.remove();
    }).catch(function(e){ alert(e); });
  }

  function loadJsPDF(){
    return new Promise(function(res,rej){
      if(window.jspdf && window.jspdf.jsPDF){ res(window.jspdf.jsPDF); return; }
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=function(){ (window.jspdf&&window.jspdf.jsPDF)? res(window.jspdf.jsPDF): rej('Không tải được jsPDF.'); };
      s.onerror=function(){ rej('Không tải được jsPDF.'); };
      document.head.appendChild(s);
    });
  }

  function exportPDF(){
    var g=getData();
    Promise.all([loadJsPDF(), svgToCanvas(2)]).then(function(arr){
      var jsPDF=arr[0], canvas=arr[1];
      var doc=new jsPDF({orientation:'landscape', unit:'pt', format:'a4'});
      var pw=doc.internal.pageSize.getWidth();
      doc.setFontSize(14);
      doc.text('Bao cao: '+(g.prog==='hssv'?'HSSV':'Chuong trinh toi')+' - Thang '+(g.mon||''), 40, 40);
      var imgData=canvas.toDataURL('image/png');
      var maxW=pw-80;
      var ratio=canvas.height/canvas.width;
      var iw=maxW, ih=maxW*ratio;
      if(ih>320){ ih=320; iw=ih/ratio; }
      doc.addImage(imgData,'PNG',40,60,iw,ih);
      var aoa=tableForExport();
      var y=60+ih+24;
      doc.setFontSize(9);
      aoa.slice(0,26).forEach(function(row){
        doc.text(row.map(function(c){return String(c);}).join('   |   '), 40, y);
        y+=14;
        if(y>doc.internal.pageSize.getHeight()-30){ doc.addPage(); y=40; }
      });
      doc.save(fname('pdf'));
    }).catch(function(e){ alert(e); });
  }

  function injectExportBar(){
    var dash=document.getElementById('cnDashCard'); if(!dash) return false;
    if(document.getElementById('cn-export-bar')) return true;
    var h3=dash.querySelector('h3.cn-h');
    var bar=document.createElement('div');
    bar.id='cn-export-bar';
    bar.className='cn-row';
    bar.style.cssText='margin:0 0 10px;gap:8px;align-items:center;flex-wrap:wrap';
    bar.innerHTML='<span style="font-weight:600;color:#555;font-size:12px">Xuất báo cáo:</span>'
      +'<button type="button" class="cn-btn sec cn-exp" data-t="xlsx">Excel (.xlsx)</button>'
      +'<button type="button" class="cn-btn sec cn-exp" data-t="pdf">PDF</button>'
      +'<button type="button" class="cn-btn sec cn-exp" data-t="png">PNG</button>';
    if(h3 && h3.parentNode){ h3.parentNode.insertBefore(bar, h3.nextSibling); }
    else { dash.insertBefore(bar, dash.firstChild); }
    bar.addEventListener('click', function(e){
      var b=e.target.closest('.cn-exp'); if(!b) return;
      var ty=b.getAttribute('data-t');
      if(ty==='xlsx') exportExcel();
      else if(ty==='pdf') exportPDF();
      else if(ty==='png') exportPNG();
    });
    return true;
  }

  function tick(){ var a=reorder(); var b=injectExportBar(); return a && b; }

  var done=false;
  function run(){ if(done) return; if(tick()){ done=true; mo.disconnect(); } }
  var mo=new MutationObserver(function(){ run(); });
  function start(){
    var wrap=document.getElementById(WRAP);
    if(wrap) mo.observe(wrap, {childList:true, subtree:false});
    mo.observe(document.body, {childList:true, subtree:true});
    run();
    var n=0; var iv=setInterval(function(){ run(); if(done || ++n>40) clearInterval(iv); }, 250);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', start); else start();
})();

<script id="cn-analysis-js">
(function(){
  'use strict';
  var KEY='ctkm_num_v1';
  var CFG_KEY='ctkm_analysis_cfg_v1';
  var MONTH_DAYS={T5:31,T6:30,T7:31};
  function load(){try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;}}
  function loadCfg(){try{return JSON.parse(localStorage.getItem(CFG_KEY))||{};}catch(e){return {};}}
  function saveCfg(c){try{localStorage.setItem(CFG_KEY,JSON.stringify(c));}catch(e){}}
  function fmt(n){ if(n==null||isNaN(n)) return '—'; return Math.round(n).toLocaleString('vi-VN'); }
  function fmtVND(n){ if(n==null||isNaN(n)) return '—'; return Math.round(n).toLocaleString('vi-VN')+'đ'; }
  function pct(a,b){ if(!b) return 0; return a/b*100; }
  // ---- data helpers ----
  function hssvKhach(d,m){ var arr=(d.hssv&&d.hssv[m])||[]; return arr.reduce(function(s,r){return s+(r.totKhach||0);},0); }
  function promoKhach(d,m){ var o=d.promo&&d.promo[m]; if(!o||!o.rows) return 0; return o.rows.reduce(function(s,r){return s+(r.sl||0);},0); }
  function promoPrice(d,m){ var o=d.promo&&d.promo[m]; return (o&&o.price)?o.price*1000:0; }
  function daysWithData(arr,field){ return (arr||[]).filter(function(r){return field?(r[field]!=null&&r[field]>0):(r.totKhach!=null&&r.totKhach>0);}).length; }
  function promoDaysWithData(rows){ return (rows||[]).filter(function(r){return r.sl!=null&&r.sl>0;}).length; }
  // find current month = the one with most recent data (has any entries)
  function pickCurMonth(d){ var order=['T7','T6','T5']; for(var i=0;i<order.length;i++){ var m=order[i]; if(hssvKhach(d,m)>0||promoKhach(d,m)>0) return m; } return 'T7'; }
  function prevMonth(m){ return {T7:'T6',T6:'T5',T5:null}[m]; }
  function block(title,cls,kpis,recHTML){
    var g=kpis.map(function(k){ return '<div class="an-kpi"><div class="k">'+k.k+'</div><div class="v '+(k.cls||'')+'">'+k.v+'</div>'+(k.bar!=null?'<div class="an-bar"><i style="width:'+Math.min(100,Math.max(0,k.bar))+'%"></i></div>':'')+'</div>'; }).join('');
    return '<div class="an-block '+(cls||'')+'"><h4>'+title+'</h4><div class="an-grid">'+g+'</div>'+(recHTML?'<div class="an-rec">'+recHTML+'</div>':'')+'</div>';
  }
  // ---- core analysis for one revenue stream ----
  function analyzeStream(opts){
    // opts: {label, price, curKhach, curDays, target, remainDays, fixedCost}
    var rev = opts.curKhach*opts.price;
    var beCust = opts.price? opts.fixedCost/opts.price : 0; // breakeven customers
    var bePct = pct(opts.curKhach, beCust);
    var need = Math.max(0, opts.target - opts.curKhach);
    var perDay = opts.remainDays>0? need/opts.remainDays : need;
    var goalPct = pct(opts.curKhach, opts.target);
    return {rev:rev, beCust:beCust, bePct:bePct, need:need, perDay:perDay, goalPct:goalPct};
  }
  function kpiSet(a, opts){
    var beCls = a.bePct>=100?'good':(a.bePct>=70?'warn':'bad');
    var goalCls = a.goalPct>=100?'good':(a.goalPct>=70?'warn':'bad');
    return [
      {k:'Khách hiện tại', v:fmt(opts.curKhach)},
      {k:'Doanh thu ước tính', v:fmtVND(a.rev)},
      {k:'Mốc hòa vốn', v:fmt(a.beCust)+' khách'},
      {k:'% Hòa vốn', v:a.bePct.toFixed(1)+'%', cls:beCls, bar:a.bePct},
      {k:'Mục tiêu ('+opts.targetLabel+')', v:fmt(opts.target)+' khách'},
      {k:'% Đạt mục tiêu', v:a.goalPct.toFixed(1)+'%', cls:goalCls, bar:a.goalPct},
      {k:'Còn cần thêm', v:fmt(a.need)+' khách'},
      {k:'TB cần/ngày ('+opts.remainDays+' ngày)', v:a.perDay.toFixed(1)+' khách'}
    ];
  }
  function recFor(name, a, opts){
    if(a.bePct>=100){
      if(a.goalPct>=100) return '<b>'+name+':</b> Đã hòa vốn và vượt mục tiêu. Mỗi khách mới là lợi nhuận ròng — tập trung giữ chân khách & nâng chất lượng dịch vụ thay vì giảm giá.';
      if(a.perDay<=12) return '<b>'+name+':</b> Đã hòa vốn (vượt xa mốc). Chỉ cần ~'+a.perDay.toFixed(1)+' khách/ngày trong '+opts.remainDays+' ngày là vượt mục tiêu. Áp lực thấp — không cần giảm giá sâu, ưu tiên chất lượng dịch vụ.';
      return '<b>'+name+':</b> Đã hòa vốn. Cần ~'+a.perDay.toFixed(1)+' khách/ngày để đạt mục tiêu — nên đẩy nhẹ truyền thông/ưu đãi có kiểm soát biên lợi nhuận.';
    }
    return '<b>'+name+':</b> Chưa hòa vốn ('+a.bePct.toFixed(1)+'%). Cần thêm '+fmt(Math.max(0,a.beCust-opts.curKhach))+' khách để hòa vốn. Cân nhắc chương trình kéo khách ngắn hạn.';
  }
  window.renderCNAnalysis=function(){
    var host=document.getElementById('cnAnalysisBody'); if(!host) return;
    var d=load(); if(!d){ host.innerHTML='<div class="an-rec">Chưa có dữ liệu. Hãy nhập số liệu ở tab Số liệu CTKM trước.</div>'; return; }
    var cfg=loadCfg();
    var fixedCost=(cfg.fixedCost!=null?cfg.fixedCost:15000000);
    var hssvPrice=(cfg.hssvPrice!=null?cfg.hssvPrice:60000);
    var cur=pickCurMonth(d); var prev=prevMonth(cur);
    // targets: max of prev month and highest month
    var allM=['T5','T6','T7'];
    function totKhachOf(m){ return hssvKhach(d,m)+promoKhach(d,m); }
    var highest=allM.reduce(function(best,m){ return totKhachOf(m)>totKhachOf(best)?m:best; }, allM[0]);
    // remaining days in current month
    var curHssvDays=daysWithData(d.hssv&&d.hssv[cur]);
    var curPromoDays=promoDaysWithData(d.promo&&d.promo[cur]&&d.promo[cur].rows);
    var elapsed=Math.max(curHssvDays,curPromoDays,1);
    var remain=Math.max(0,(MONTH_DAYS[cur]||30)-elapsed);
    var out='';
    // ---- Promo stream ----
    (function(){
      var price=promoPrice(d,cur); if(!price){ return; }
      var curK=promoKhach(d,cur);
      var prevK=prev?promoKhach(d,prev):0;
      var highK=promoKhach(d,highest);
      var target=Math.max(prevK,highK);
      var tLabel = target===prevK && target!==highK ? ('T'+prev.slice(1)) : ('cao nhất T'+highest.slice(1));
      if(prevK>=highK) tLabel='T'+prev.slice(1);
      var a=analyzeStream({price:price,curKhach:curK,target:target,remainDays:remain,fixedCost:fixedCost});
      out+=block('Gói CTKM tối ('+(price/1000)+'k) — '+cur, 'b-promo', kpiSet(a,{curKhach:curK,target:target,targetLabel:tLabel,remainDays:remain}), recFor('Gói CTKM',a,{curKhach:curK,remainDays:remain}));
    })();
    // ---- HSSV stream ----
    (function(){
      var curK=hssvKhach(d,cur);
      var prevK=prev?hssvKhach(d,prev):0;
      var highK=Math.max(hssvKhach(d,'T5'),hssvKhach(d,'T6'),hssvKhach(d,'T7'));
      var target=Math.max(prevK,highK);
      var tLabel= prevK>=highK ? ('T'+ (prev?prev.slice(1):'') ) : 'cao nhất';
      var a=analyzeStream({price:hssvPrice,curKhach:curK,target:target,remainDays:remain,fixedCost:fixedCost});
      out+=block('Mảng HSSV — '+cur+' (đơn giá '+fmtVND(hssvPrice)+')', 'b-hssv', kpiSet(a,{curKhach:curK,target:target,targetLabel:tLabel,remainDays:remain}), recFor('HSSV',a,{curKhach:curK,remainDays:remain}));
    })();
    // ---- Total ----
    (function(){
      var curK=totKhachOf(cur);
      var prevK=prev?totKhachOf(prev):0;
      var highK=totKhachOf(highest);
      var target=Math.max(prevK,highK);
      var tLabel = prevK>=highK ? ('T'+(prev?prev.slice(1):'')) : ('cao nhất T'+highest.slice(1));
      // blended revenue = promo rev + hssv rev
      var rev=promoKhach(d,cur)*promoPrice(d,cur)+hssvKhach(d,cur)*hssvPrice;
      var beCust= 0; // combined breakeven expressed as customers is ambiguous; show revenue-based
      var beRev=fixedCost;
      var bePct=pct(rev,beRev);
      var need=Math.max(0,target-curK);
      var perDay=remain>0?need/remain:need;
      var goalPct=pct(curK,target);
      var beCls=bePct>=100?'good':(bePct>=70?'warn':'bad');
      var goalCls=goalPct>=100?'good':(goalPct>=70?'warn':'bad');
      var kpis=[
        {k:'Tổng khách '+cur, v:fmt(curK)},
        {k:'Tổng doanh thu ước tính', v:fmtVND(rev)},
        {k:'Chi phí cố định', v:fmtVND(beRev)},
        {k:'% Hòa vốn (theo DT)', v:bePct.toFixed(1)+'%', cls:beCls, bar:bePct},
        {k:'Mục tiêu ('+tLabel+')', v:fmt(target)+' khách'},
        {k:'% Đạt mục tiêu', v:goalPct.toFixed(1)+'%', cls:goalCls, bar:goalPct},
        {k:'Còn cần thêm', v:fmt(need)+' khách'},
        {k:'TB cần/ngày ('+remain+' ngày)', v:perDay.toFixed(1)+' khách'}
      ];
      var rec;
      if(bePct>=100){ rec='<b>Tổng quan:</b> Toàn quán đã hòa vốn (đạt '+bePct.toFixed(0)+'% theo doanh thu). '+(goalPct>=100?'Đã vượt mục tiêu — mọi khách mới là lợi nhuận ròng.':('Cần TB ~'+perDay.toFixed(1)+' khách/ngày trong '+remain+' ngày còn lại để vượt mục tiêu '+tLabel+'. '+(perDay<=15?'Áp lực thấp: ưu tiên chất lượng dịch vụ, không giảm giá sâu.':'Nên tăng cường truyền thông/ưu đãi có kiểm soát.'))); }
      else { rec='<b>Tổng quan:</b> Chưa hòa vốn ('+bePct.toFixed(1)+'%). Ưu tiên tăng lượng khách để đạt điểm hòa vốn trước khi tính mục tiêu tăng trưởng.'; }
      out+=block('TỔNG KHÁCH (Tất cả chương trình) — '+cur, 'b-tot', kpis, rec);
    })();
    host.innerHTML=out;
  };
  function ensureCard(){
    var wrap=document.getElementById('ctkmNumWrap'); if(!wrap) return false;
    if(document.getElementById('cnAnalysisCard')) return true;
    var cfg=loadCfg();
    var fixedCost=(cfg.fixedCost!=null?cfg.fixedCost:15000000);
    var hssvPrice=(cfg.hssvPrice!=null?cfg.hssvPrice:60000);
    var card=document.createElement('div'); card.className='cn-card'; card.id='cnAnalysisCard';
    card.innerHTML='<h3 class="cn-h">📊 Phân tích tình hình kinh doanh</h3>'
      +'<div class="an-inputs">'
      +'<div class="an-f"><label>Chi phí cố định / tháng (đ)</label><input type="number" id="an_fixed" value="'+fixedCost+'" min="0" step="500000"></div>'
      +'<div class="an-f"><label>Đơn giá HSSV TB (đ)</label><input type="number" id="an_hssv" value="'+hssvPrice+'" min="0" step="5000"></div>'
      +'<div class="an-f"><label>&nbsp;</label><button class="cn-btn" id="an_refresh">Cập nhật phân tích</button></div>'
      +'</div>'
      +'<div class="cn-hint">Mốc hòa vốn = Chi phí cố định ÷ đơn giá. Đơn giá HSSV chưa có số thật → mặc định 60.000đ (có thể suy chính xác từ: doanh thu thật ÷ tổng khách). Mục tiêu = tổng khách tháng liền trước hoặc tháng cao nhất.</div>'
      +'<div id="cnAnalysisBody" style="margin-top:12px"></div>';
    wrap.appendChild(card);
    function apply(){ var c=loadCfg(); c.fixedCost=parseFloat(document.getElementById('an_fixed').value)||0; c.hssvPrice=parseFloat(document.getElementById('an_hssv').value)||0; saveCfg(c); window.renderCNAnalysis(); }
    document.getElementById('an_refresh').onclick=apply;
    document.getElementById('an_fixed').addEventListener('change',apply);
    document.getElementById('an_hssv').addEventListener('change',apply);
    window.renderCNAnalysis();
    return true;
  }
  // Show/refresh when the CTKM tab is opened
  function hook(){
    var t=document.getElementById('tabCtkmNum');
    if(t && !t.__anHook){ t.__anHook=true; t.addEventListener('click',function(){ setTimeout(function(){ ensureCard(); window.renderCNAnalysis&&window.renderCNAnalysis(); },120); }); }
  }
  var n=0, iv=setInterval(function(){ hook(); if(document.getElementById('ctkmNumWrap')){ ensureCard(); } if(++n>60) clearInterval(iv); },500);
})();
</script>
